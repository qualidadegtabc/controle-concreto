<style>
:root{
  --paper:#FFFBEE; --card:#FFFEF8; --ink:#0E0E0E; --muted:#7A746A;
  --line:#EAE2C6; --accent:#BD5D27; --accent-ink:#8E4319; --accent-soft:#F7E7D7;
  --ok:#3F945A; --warn:#FAA21B; --bad:#B02A20; --head:#F1EFE7;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Montserrat",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}

.topbar{background:var(--ink);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:14px}
.topbar .logo{font-weight:800;border:2px solid #fff;border-radius:8px;padding:4px 10px;font-size:14px;letter-spacing:.4px}
.topbar .ttl{font-weight:700;font-size:17px}
.topbar .co{font-size:12px;color:#cfc9bd}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:13px;color:#cfc9bd}
.topbar .sair{background:none;border:0;color:#fff;font-weight:700;font-size:13px;text-decoration:underline}

.tabs{display:flex;gap:8px;padding:16px 26px 0;border-bottom:1px solid var(--line);background:#fff}
.tab{padding:12px 22px;border:0;background:none;font-weight:700;font-size:15px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}

.wrap{max-width:1100px;margin:0 auto;padding:26px}
.officehead h2{font-size:22px;margin:0 0 4px}
.officehead p{color:var(--muted);margin:0 0 20px;font-size:14px}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.card .ch{font-weight:700;font-size:16px;margin-bottom:4px}
.card .cs{color:var(--muted);font-size:13px;margin-bottom:14px}

table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--head);text-align:left;padding:11px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#524d44;font-weight:700;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
select,input{font-size:15px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23BD5D27' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:34px}

.btn{padding:13px 26px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px}
.btn:disabled{opacity:.6}
.btn.ghost{background:#fff;color:var(--accent-ink);border:2px solid var(--accent)}
.estado{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;line-height:1.6}
.erro{background:#fde8e2;border:1px solid #e0b09f;color:#8a3220;border-radius:10px;padding:14px;font-size:14px;margin-bottom:16px}

/* login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px}
.login-box{width:100%;max-width:380px}
.login-logo{font-weight:800;border:3px solid var(--ink);border-radius:12px;padding:10px 16px;font-size:22px;text-align:center;width:fit-content;margin:0 auto 10px}
.login-tit{color:var(--accent);font-size:20px;font-weight:700;text-align:center}
.login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:22px}
.login-box label{display:block;font-size:13px;font-weight:700;margin:0 0 6px}
.login-box input{width:100%;margin-bottom:14px;min-height:50px}
.login-box .btn{width:100%}
.chip{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);border:1px solid #e3c3a6;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:700}
.badge{display:inline-block;border-radius:7px;padding:2px 8px;font-size:11px;font-weight:700}
.b-ok{background:#eaf3ec;color:var(--ok);border:1px solid #bcd2bf}
.b-bad{background:#fde8e2;color:#8a3220;border:1px solid #e0b09f}
.b-mut{background:#ecebe4;color:#6f6a5e;border:1px solid #d9d2c0}
.muted{color:var(--muted)}
.cpchip{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:19px;line-height:1;
  background:var(--accent);color:#fff;border-radius:9px;padding:9px 12px;min-width:54px;text-align:center;
  letter-spacing:.5px;box-shadow:0 1px 0 rgba(0,0,0,.08)}
</style>

// ---- helpers de data ----
function addDiasISO(dataISO, dias){ const d=new Date(dataISO+'T00:00:00'); d.setDate(d.getDate()+(+dias)); return d.toISOString().slice(0,10); }
function fmtData(iso){ if(!iso) return '—'; const[a,m,d]=iso.split('-'); return `${d}/${m}/${a}`; }
// Supabase devolve relação 1:1 (ex.: o rompimento de um CP) como objeto único, não lista. Normaliza p/ array.
function asArr(v){ return v==null ? [] : (Array.isArray(v) ? v : [v]); }
// rótulo de traço: fck X · slump±tol · descrição
function labelTraco(d){
  const has=v=>v!==null&&v!==undefined&&String(v).trim()!=='';
  let s=`fck ${has(d.fck)?d.fck:'—'}`;
  if(has(d.slump)) s+=` · ${d.slump}±${has(d.tol)?d.tol:'?'}`;
  if(has(d.desc)) s+=` · ${d.desc}`;
  return s;
}

// ---- detecção de offline ----
function estaOffline(){ return (typeof navigator!=='undefined' && navigator.onLine===false); }
function ehErroDeRede(e){
  const m=((e&&e.message)||String(e||'')).toLowerCase();
  return estaOffline() || m.includes('failed to fetch') || m.includes('networkerror') || m.includes('fetch') || m.includes('network');
}
// mensagem padrão quando a gravação falha sem internet
function avisoSemInternet(acao){
  return `<div class="erro"><b>Sem internet — ${acao} NÃO foi salvo.</b><br>`+
    `Os números continuam na tela. Quando o sinal voltar, toque novamente para salvar. Não saia desta tela até confirmar a gravação.</div>`;
}
// banner fixo de status offline no topo
function atualizarBannerOffline(){
  let b=document.getElementById('offbanner');
  if(estaOffline()){
    if(!b){ b=document.createElement('div'); b.id='offbanner';
      b.style.cssText='position:sticky;top:0;z-index:50;background:#8a3220;color:#fff;text-align:center;padding:8px 14px;font-size:13px;font-weight:700';
      b.textContent='⚠ Sem internet — você pode visualizar, mas gravações só serão salvas quando o sinal voltar.';
      document.body.insertBefore(b, document.body.firstChild);
    }
  } else if(b){ b.remove(); }
}

// ---- EDITAR PAVIMENTO DE UMA CONCRETAGEM (admin) ----
// abre uma lista suspensa na própria linha
let pavEditId = null;          // concId em edição
let pavCacheObra = {};         // cache de pavimentos por obra
async function editarPavimento(concId, obraId){
  if(!perfisUsuario.includes('admin')) return;
  if(estaOffline()){ alert('Sem internet — não é possível editar agora. Tente quando o sinal voltar.'); return; }
  try{
    if(!pavCacheObra[obraId]){
      const { data:pavs, error } = await sb.from('pavimentos').select('id,nome,ordem').eq('obra_id',obraId).order('ordem');
      if(error) throw error;
      pavCacheObra[obraId] = pavs||[];
    }
    pavEditId = concId;
    desenharResultados();
  }catch(e){ alert((ehErroDeRede(e)?'Sem internet — tente quando o sinal voltar.':'Não consegui abrir os pavimentos: '+(e.message||e))); }
}
function cancelarEditaPav(){ pavEditId=null; desenharResultados(); }
async function salvarPavimento(concId, novoPavId, obraId){
  novoPavId = parseInt(novoPavId,10);
  if(!novoPavId){ return; }
  const pavs = pavCacheObra[obraId]||[];
  const novo = pavs.find(p=>p.id===novoPavId);
  if(!novo){ alert('Pavimento inválido.'); return; }
  if(!confirm(`Mover esta concretagem para "${novo.nome}"?\n\nMuda o pavimento de TODAS as betoneiras/NFs desta mesma concretagem.`)){ return; }
  if(estaOffline()){ alert('Sem internet — a alteração NÃO foi salva.'); return; }
  try{
    const { error } = await sb.from('concretagens').update({ pavimento_id: novoPavId }).eq('id', concId);
    if(error) throw error;
    pavEditId = null;
    resLinhas = await buscarResultados();
    desenharResultados();
  }catch(e){ alert((ehErroDeRede(e)?'Sem internet — a alteração NÃO foi salva.':'Não consegui alterar: '+(e.message||e))); }
}

// ---- AUDITORIA (admin) ----
let AUD = { linhas:[], fUser:'', fAcao:'', fTabela:'', fDe:'', fAte:'' };
const ACAO_PT = { INSERT:'Criou', UPDATE:'Editou', DELETE:'Apagou' };
const TAB_PT = { concretagens:'Concretagem', betoneiras:'Betoneira', corpos_prova:'Corpo de prova', rompimentos:'Rompimento' };

async function abrirAuditoria(){
  if(!perfisUsuario.includes('admin')) return;
  abaAtual='auditoria';
  const wrap=document.getElementById('wrap');
  wrap.innerHTML='<div class="officehead"><h2>Auditoria</h2></div><div class="estado">Carregando registros…</div>';
  try{
    // puxa os registros (paginado), mais recentes primeiro
    let todos=[], de=0; const passo=1000;
    while(true){
      const { data, error } = await sb.from('auditoria').select('*').order('feito_em',{ascending:false}).range(de,de+passo-1);
      if(error) throw error;
      todos=todos.concat(data||[]);
      if(!data||data.length<passo) break;
      de+=passo; if(de>=10000) break; // teto de segurança
    }
    AUD.linhas=todos;
    desenharAuditoria();
  }catch(e){
    wrap.innerHTML='<div class="erro"><b>Não consegui carregar a auditoria.</b><br>'+(e.message||e)+'</div>';
  }
}
function audFiltrada(){
  return AUD.linhas.filter(l=>{
    if(AUD.fUser && (l.user_email||'')!==AUD.fUser) return false;
    if(AUD.fAcao && l.acao!==AUD.fAcao) return false;
    if(AUD.fTabela && l.tabela!==AUD.fTabela) return false;
    const dia=(l.feito_em||'').slice(0,10);
    if(AUD.fDe && dia<AUD.fDe) return false;
    if(AUD.fAte && dia>AUD.fAte) return false;
    return true;
  });
}
function fmtDataHora(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function desenharAuditoria(){
  const wrap=document.getElementById('wrap');
  const usuarios=[...new Set(AUD.linhas.map(l=>l.user_email).filter(Boolean))].sort();
  const opt=(arr,sel,fmtfn)=>['<option value="">Todos</option>'].concat(arr.map(v=>`<option value="${v}" ${v===sel?'selected':''}>${fmtfn?fmtfn(v):v}</option>`)).join('');
  const lista=audFiltrada();

  const linhas = lista.slice(0,500).map(l=>`<tr>
    <td class="mono" style="white-space:nowrap">${fmtDataHora(l.feito_em)}</td>
    <td style="font-size:12px">${l.user_email||'<span class="muted">sistema/importação</span>'}</td>
    <td>${ACAO_PT[l.acao]||l.acao}</td>
    <td>${TAB_PT[l.tabela]||l.tabela}</td>
    <td style="font-size:12px">${l.resumo||'—'}</td>
  </tr>`).join('');

  wrap.innerHTML=`
    <div class="officehead"><h2>Auditoria</h2><p>Registro de quem criou, editou ou apagou dados — com data e hora. Começa a registrar a partir da ativação.</p></div>
    <div class="filters" style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px">
      <div class="office-fld"><label>Usuário</label><select onchange="AUD.fUser=this.value;desenharAuditoria()">${opt(usuarios,AUD.fUser)}</select></div>
      <div class="office-fld"><label>Ação</label><select onchange="AUD.fAcao=this.value;desenharAuditoria()">${opt(['INSERT','UPDATE','DELETE'],AUD.fAcao,v=>ACAO_PT[v])}</select></div>
      <div class="office-fld"><label>Tipo</label><select onchange="AUD.fTabela=this.value;desenharAuditoria()">${opt(['concretagens','betoneiras','corpos_prova','rompimentos'],AUD.fTabela,v=>TAB_PT[v])}</select></div>
      <div class="office-fld"><label>De</label><input type="date" value="${AUD.fDe}" onchange="AUD.fDe=this.value;desenharAuditoria()"></div>
      <div class="office-fld"><label>Até</label><input type="date" value="${AUD.fAte}" onchange="AUD.fAte=this.value;desenharAuditoria()"></div>
      <button class="btn ghost" style="padding:10px 16px;font-size:14px" onclick="exportarAuditoria()">Exportar Excel</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th style="width:150px">Data / hora</th><th>Usuário</th><th style="width:90px">Ação</th><th style="width:130px">Tipo</th><th>Detalhe</th></tr></thead>
      <tbody>${linhas||`<tr><td colspan="5" class="estado" style="padding:30px">Nenhum registro para o filtro.</td></tr>`}</tbody></table>
    </div>
    <div class="cs" style="margin-top:10px">${lista.length} registro(s)${lista.length>500?' — mostrando os 500 mais recentes; use os filtros ou exporte o Excel para ver todos':''}.</div>`;
}
function exportarAuditoria(){
  if(!window.XLSX){ alert('A biblioteca de planilha não carregou. Recarregue a página.'); return; }
  const lista=audFiltrada().map(l=>({
    'Data/hora': fmtDataHora(l.feito_em),
    'Usuário': l.user_email||'sistema/importação',
    'Ação': ACAO_PT[l.acao]||l.acao,
    'Tipo': TAB_PT[l.tabela]||l.tabela,
    'Detalhe': l.resumo||''
  }));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lista), 'Auditoria');
  XLSX.writeFile(wb,'auditoria_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ---- BACK-UP COMPLETO (Excel, todas as tabelas) ----
async function exportarBackup(){
  if(!window.XLSX){ alert('A biblioteca de planilha não carregou. Verifique a conexão e recarregue a página.'); return; }
  const aviso = document.createElement('div');
  aviso.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999';
  aviso.innerHTML='<div style="background:#fff;padding:22px 28px;border-radius:14px;font-weight:700">Gerando back-up… aguarde</div>';
  document.body.appendChild(aviso);
  try{
    // puxa tudo, com os nomes legíveis já resolvidos
    const concs = await pegarTudo('concretagens','id,data_concretagem,responsavel,responsavel_nome,finalizada,assinado,assinante_nome,assinado_em,obras(nome),pavimentos(nome),elementos(nome),concreteiras(nome)');
    const bets  = await pegarTudo('betoneiras','id,concretagem_id,nota_fiscal,lacre,hora_chegada,fck,slump_especificado,tolerancia,traco_descricao,slump_medido,agua_adicionada,volume,aceita,observacao,motivos_recusa(nome)');
    const cps   = await pegarTudo('corpos_prova','id,betoneira_id,numero,idade_prevista,data_prevista,descartado');
    const romps = await pegarTudo('rompimentos','id,corpo_prova_id,idade_real,data_rompimento,prensa1_tf,resultado_mpa,confirmado,observacao');

    const fData = v => v ? String(v).slice(0,10).split('-').reverse().join('/') : '';
    const linConc = concs.map(c=>({
      ID:c.id, Data:fData(c.data_concretagem), Obra:c.obras&&c.obras.nome, Pavimento:c.pavimentos&&c.pavimentos.nome,
      Elemento:c.elementos&&c.elementos.nome, Concreteira:c.concreteiras&&c.concreteiras.nome,
      Responsável:c.responsavel_nome||c.responsavel, Finalizada:c.finalizada?'sim':'não',
      Assinada:c.assinado?'sim':'não', 'Resp. Engenharia':c.assinante_nome||'', 'Assinada em':fData(c.assinado_em)
    }));
    const linBet = bets.map(b=>({
      ID:b.id, 'Concretagem (ID)':b.concretagem_id, NF:b.nota_fiscal, Lacre:b.lacre, Chegada:b.hora_chegada,
      fck:b.fck, 'Slump esp.':b.slump_especificado, Tolerância:b.tolerancia, 'Descrição traço':b.traco_descricao,
      'Slump medido':b.slump_medido, 'Água (L)':b.agua_adicionada, 'Volume (m³)':b.volume,
      Aceite:b.aceita?'aceita':'recusada', Motivo:b.motivos_recusa&&b.motivos_recusa.nome, Observação:b.observacao
    }));
    const linCp = cps.map(c=>({
      ID:c.id, 'Betoneira (ID)':c.betoneira_id, 'Nº CP':c.numero, 'Idade prevista (d)':c.idade_prevista,
      'Data prevista':fData(c.data_prevista), Descartado:c.descartado?'sim':'não'
    }));
    const linRomp = romps.map(r=>({
      ID:r.id, 'CP (ID)':r.corpo_prova_id, 'Idade (d)':r.idade_real, 'Data rompim.':fData(r.data_rompimento),
      'Prensa (tf)':r.prensa1_tf, 'Resultado (MPa)':r.resultado_mpa, Confirmado:r.confirmado?'sim':'não', Observação:r.observacao
    }));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linConc), 'Concretagens');

// lê a tabela inteira em páginas de 1000 (limite do Supabase)
async function pegarTudo(tabela, cols, mod){
  let todos=[], de=0; const passo=1000;
  while(true){
    let q = sb.from(tabela).select(cols);
    if(mod) q = mod(q);
    const { data, error } = await q.range(de, de+passo-1);
    if(error) throw error;
    todos = todos.concat(data||[]);
    if(!data || data.length<passo) break;
    de += passo;
  }
  return todos;
}

// ---- PROGRAMAR IDADES (por traço, com padrão da 1ª betoneira) ----
let progGrupos=[], progEscolhas={};
// busca CPs sem idade, monta: concretagem -> traço(fck) -> betoneiras(NF) -> duplas
async function buscarParaProgramar(){
  const { data, error } = await sb.from('corpos_prova')
    .select('id,numero,idade_prevista,betoneira_id,betoneiras!inner(id,nota_fiscal,fck,concretagem_id,criado_em,concretagens!inner(id,data_concretagem,obras!inner(nome),pavimentos!inner(nome),elementos(nome)))')
    .is('idade_prevista', null).eq('descartado', false).order('numero',{ascending:true});
  if(error) throw error;

  // 1) agrupa CPs por betoneira
  const bts={};
  (data||[]).forEach(cp=>{
    const b=cp.betoneiras, c=b.concretagens;
    if(!bts[b.id]) bts[b.id]={betoneiraId:b.id, nf:b.nota_fiscal, fck:b.fck, criado:b.criado_em,
      concId:c.id, obra:c.obras.nome, pav:c.pavimentos.nome, elem:(c.elementos&&c.elementos.nome)||'', data:c.data_concretagem, cps:[]};
    bts[b.id].cps.push({id:cp.id, numero:cp.numero});
  });
  // forma duplas por betoneira (par na ordem; ímpar sobra 1)
  Object.values(bts).forEach(b=>{ b.cps.sort((x,y)=>x.numero-y.numero); b.duplas=[]; for(let i=0;i<b.cps.length;i+=2) b.duplas.push(b.cps.slice(i,i+2)); b.nDuplas=b.duplas.length; });

  // 2) agrupa betoneiras por (concretagem + fck = traço)
  const tracos={};
  Object.values(bts).forEach(b=>{
    const chave = b.concId+'|'+b.fck;
    if(!tracos[chave]) tracos[chave]={concId:b.concId, fck:b.fck, obra:b.obra, pav:b.pav, elem:b.elem, data:b.data, betoneiras:[]};
    tracos[chave].betoneiras.push(b);
  });

  // 3) em cada traço: 1ª betoneira (mais antiga) define o padrão; separa avulsas (qtd de duplas diferente)
  const grupos=Object.values(tracos).map(t=>{
    t.betoneiras.sort((a,b)=> (a.criado<b.criado?-1:a.criado>b.criado?1:0));
    const padraoN = t.betoneiras[0].nDuplas;
    t.padraoN = padraoN;
    t.noPadrao = t.betoneiras.filter(b=>b.nDuplas===padraoN);
    t.avulsas  = t.betoneiras.filter(b=>b.nDuplas!==padraoN);
    return t;
  });
  grupos.sort((a,b)=> a.data<b.data?1:a.data>b.data?-1:0);
  return grupos;
}

      b.duplas.forEach((d,di)=>{

async function salvarProgramacao(){
  const updates=[];
  progGrupos.forEach((t,ti)=>{
    // padrão: cada posição -> aplica à dupla correspondente de cada NF no padrão
    for(let pos=0; pos<t.padraoN; pos++){
      const idade=progEscolhas['T'+ti+':'+pos];
      if(!idade) continue;
      const dp=addDiasISO(t.data, idade);
      t.noPadrao.forEach(b=>{
        const dupla=b.duplas[pos];
        if(dupla) dupla.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    }
    // avulsas
    t.avulsas.forEach(b=>{
      b.duplas.forEach((d,di)=>{
        const idade=progEscolhas['A'+b.betoneiraId+':'+di];
        if(!idade) return;
        const dp=addDiasISO(t.data, idade);
        d.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    });
  });
  if(!updates.length){ alert('Escolha a idade de ao menos uma dupla.'); return; }
  if(estaOffline()){ document.getElementById('wrap').insertAdjacentHTML('afterbegin', avisoSemInternet('a programação')); window.scrollTo(0,0); return; }
  try{
    const res=await Promise.all(updates.map(u=>sb.from('corpos_prova').update({idade_prevista:u.idade_prevista,data_prevista:u.data_prevista}).eq('id',u.id)));
    for(const r of res) if(r.error) throw r.error;
    const wrap=document.getElementById('wrap');
    wrap.innerHTML=`<div class="officehead"><h2>Programar idades</h2></div>
      <div class="card" style="text-align:center"><div style="font-size:44px">✓</div>
      <div style="font-weight:700;font-size:18px;color:var(--ok);margin:6px 0">Idades programadas!</div>
      <div class="cs">${updates.length} corpo(s) de prova com data de rompimento definida.</div>
      <button class="btn" onclick="abaProgramar()" style="margin-top:8px">Programar mais</button></div>`;
  }catch(e){
    const msg = ehErroDeRede(e) ? avisoSemInternet('a programação') : '<div class="erro"><b>Não consegui salvar.</b><br>'+(e.message||e)+'</div>';
    document.getElementById('wrap').insertAdjacentHTML('afterbegin', msg); window.scrollTo(0,0);
  }
}

const MPA_PER_TF = 1.2486;

let rompGrupos = [];        // duplas a romper

function hojeISO(){ return new Date().toISOString().slice(0,10); }

// busca TODAS as duplas pendentes (idade programada, não rompidas) — sem limite de data
async function buscarTodasPendentes(){
  const data = await pegarTudo('corpos_prova',
    'id,numero,idade_prevista,data_prevista,betoneira_id,betoneiras!inner(id,nota_fiscal,fck,slump_especificado,tolerancia,traco_descricao,concretagens!inner(id,data_concretagem,obras!inner(nome),pavimentos!inner(nome))),rompimentos(id)',
    q=>q.not('idade_prevista','is',null).eq('descartado',false).order('numero',{ascending:true}));
  const semRomp = (data||[]).filter(cp=> asArr(cp.rompimentos).length===0);
  const grp={};
  semRomp.forEach(cp=>{
    const b=cp.betoneiras, c=b.concretagens;
    const chave=b.id+'|'+cp.idade_prevista+'|'+cp.data_prevista;
    if(!grp[chave]) grp[chave]={ key:chave, betoneiraId:b.id, nf:b.nota_fiscal, fck:b.fck,
      slump:b.slump_especificado, tol:b.tolerancia, desc:b.traco_descricao,
      obra:c.obras.nome, pav:c.pavimentos.nome, idade:cp.idade_prevista, prevista:cp.data_prevista, moldagem:c.data_concretagem, cps:[] };
    grp[chave].cps.push({id:cp.id, numero:cp.numero});
  });
  const duplas=[];
  Object.values(grp).forEach(g=>{
    g.cps.sort((a,b)=>a.numero-b.numero);
    for(let i=0;i<g.cps.length;i+=2) duplas.push({ ...g, cps:g.cps.slice(i,i+2), duplaKey:g.key+':'+i });
  });
  duplas.sort((a,b)=> a.prevista<b.prevista?-1:a.prevista>b.prevista?1:(a.cps[0].numero-b.cps[0].numero));
  return duplas;
}

// rompimentos já confirmados na data escolhida (agrupados por dupla)
async function buscarRompidosDia(dataISO){
  const { data, error } = await sb.from('rompimentos')
    .select('id,prensa1_tf,resultado_mpa,idade_real,data_rompimento,observacao,corpo_prova_id,corpos_prova!inner(numero,betoneira_id,betoneiras!inner(nota_fiscal,fck,slump_especificado,tolerancia,traco_descricao,concretagens!inner(obras!inner(nome),pavimentos!inner(nome))))')
    .eq('data_rompimento', dataISO)
    .order('id',{ascending:true});
  if(error) throw error;
  const itens = (data||[]).map(r=>{
    const cp=r.corpos_prova, b=cp.betoneiras, c=b.concretagens;
    return { rompId:r.id, cpId:r.corpo_prova_id, numero:cp.numero, betoneiraId:cp.betoneira_id,
      nf:b.nota_fiscal, fck:b.fck, slump:b.slump_especificado, tol:b.tolerancia, desc:b.traco_descricao,
      obra:c.obras.nome, pav:c.pavimentos.nome,
      idade:r.idade_real, tf:r.prensa1_tf, mpa:r.resultado_mpa, obs:r.observacao };
  });
  const grp={};
  itens.forEach(it=>{
    const chave=it.betoneiraId+'|'+it.idade;
    if(!grp[chave]) grp[chave]={ chave, nf:it.nf, fck:it.fck, slump:it.slump, tol:it.tol, desc:it.desc, obra:it.obra, pav:it.pav, idade:it.idade, itens:[] };
    grp[chave].itens.push(it);
  });
  const duplas=[];
  Object.values(grp).forEach(g=>{
    g.itens.sort((a,b)=>a.numero-b.numero);
    for(let i=0;i<g.itens.length;i+=2){
      const par=g.itens.slice(i,i+2);
      const mpaVals=par.map(x=>x.mpa!=null?Number(x.mpa):(x.tf!=null?x.tf*MPA_PER_TF:null)).filter(v=>v!=null);
      duplas.push({ ...g, itens:par, duplaId:g.chave+':'+i, resultado: mpaVals.length?Math.max(...mpaVals):null });
    }
  });
  return duplas;
}

let pendentesTodas = []; // cache de todas as duplas pendentes

// betoneiras cujo rompimento de 28d (ou mais) já saiu E ficou conforme (resultado >= fck)
async function buscarBetoneiras28Conforme(){
  const data = await pegarTudo('rompimentos',
    'resultado_mpa,prensa1_tf,idade_real,corpos_prova!inner(betoneira_id,betoneiras!inner(fck))',
    q=>q.gte('idade_real', 28));
  const ok = new Set();
  (data||[]).forEach(r=>{
    const cp=r.corpos_prova; if(!cp||!cp.betoneiras) return;
    const fck=cp.betoneiras.fck||0;
    const mpa = r.resultado_mpa!=null ? Number(r.resultado_mpa) : (r.prensa1_tf!=null ? r.prensa1_tf*MPA_PER_TF : null);
    if(mpa!=null && mpa>=fck) ok.add(cp.betoneira_id);
  });

}
async function abaRomper(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML = `<div class="officehead"><h2>Romper</h2><p>Lance as prensas (tf) de cada corpo de prova. O resultado em MPa e a conformidade são calculados automaticamente.</p></div><div class="estado">Buscando corpos de prova…</div>`;
  try{
    pendentesTodas = await buscarTodasPendentes();

    dispensaveis = pendentesTodas.filter(d=> d.idade===63 && okBt28.has(d.betoneiraId));
    // datas previstas disponíveis (com CP a romper), ordenadas
    rompDatasDisp = [...new Set(pendentesTodas.map(d=>d.prevista))].sort();
    // define filtro inicial: hoje se houver, senão a 1ª data disponível, senão atrasados
    if(!rompFiltroData){
      const hoje=hojeISO();
      if(rompDatasDisp.includes(hoje)) rompFiltroData=hoje;
      else if(rompDatasDisp.some(d=>d<hoje)) rompFiltroData='ATRASADOS';
      else rompFiltroData = rompDatasDisp[0]||'';
    }
    aplicarFiltroRomper();
    // rompidos do dia: usa a data escolhida se for uma data real; senão hoje
    const dataRomp = (rompFiltroData && rompFiltroData!=='ATRASADOS') ? rompFiltroData : hojeISO();
    rompidosDia = await buscarRompidosDia(dataRomp);
    rompInputs={}; rompObs={}; editRomp={};
    desenharRomper();
  }catch(e){ wrap.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}
// monta rompGrupos conforme o filtro de data
function aplicarFiltroRomper(){
  const hoje=hojeISO();
  const dispKeys = new Set(dispensaveis.map(d=>d.duplaKey));
  if(rompFiltroData==='ATRASADOS'){
    rompGrupos = pendentesTodas.filter(d=>d.prevista<hoje);
  } else if(rompFiltroData){
    // CPs daquela data + atrasados (anteriores)
    rompGrupos = pendentesTodas.filter(d=>d.prevista<=rompFiltroData);
  } else {
    rompGrupos = [];
  }
  // tira os 63d liberados para descarte — eles aparecem só na faixa de descarte
  rompGrupos = rompGrupos.filter(d=>!dispKeys.has(d.duplaKey));
}
async function trocarDataRomper(v){
  rompFiltroData = v;
  aplicarFiltroRomper();
  const dataRomp = (v && v!=='ATRASADOS') ? v : hojeISO();
  try{ rompidosDia = await buscarRompidosDia(dataRomp); }catch(e){ rompidosDia=[]; }
  rompInputs={}; rompObs={};
  desenharRomper();
}

function previaMPa(cpId){
  const tf = parseFloat(String(rompInputs[cpId]||'').replace(',','.'));
  if(isNaN(tf)||tf<=0) return null;

}
function resultadoDupla(d){
  const vals = d.cps.map(c=>previaMPa(c.id)).filter(v=>v!=null);

}

// reprograma a idade: salva no banco (idade_prevista + data_prevista) após confirmação
async function reprogramarIdade(duplaKey, novaIdade, selectEl){
  const d = pendentesTodas.find(x=>x.duplaKey===duplaKey);
  if(!d){ return; }

    for(const r of res) if(r.error) throw r.error;
    await abaRomper(); // recarrega: a dupla reposiciona conforme a nova data
  }catch(e){ alert((ehErroDeRede(e)?'Sem internet — a reprogramação NÃO foi salva. Tente novamente quando o sinal voltar.':'Não consegui reprogramar: '+(e.message||e))); if(selectEl) selectEl.value=d.idade; }

// edição da dupla rompida
function abrirEdicaoDupla(duplaId){
  const d = rompidosDia.find(x=>x.duplaId===duplaId);
  if(!d) return;
  const p={}; d.itens.forEach(it=>{ p[it.rompId]= it.tf!=null? String(it.tf):''; });
  editRomp[duplaId]={ p, obs: d.itens[0].obs||'' };
  desenharRomper();
}
function cancelarEdicaoDupla(duplaId){ delete editRomp[duplaId]; desenharRomper(); }
async function salvarEdicaoDupla(duplaId){
  const d = rompidosDia.find(x=>x.duplaId===duplaId);
  const e = editRomp[duplaId];
  if(!d||!e) return;
  const ups=[];
  for(const it of d.itens){
    const tf=parseFloat(String(e.p[it.rompId]||'').replace(',','.'));
    if(isNaN(tf)||tf<=0){ alert('Informe prensa válida para CP'+it.numero+'.'); return; }
    ups.push({ rompId:it.rompId, tf });
  }
  if(estaOffline()){ alert('Sem internet — a edição NÃO foi salva. Os valores continuam na tela; tente novamente quando o sinal voltar.'); return; }
  try{
    const res=await Promise.all(ups.map(u=>sb.from('rompimentos').update({prensa1_tf:u.tf, observacao:e.obs||null}).eq('id',u.rompId)));
    for(const r of res) if(r.error) throw r.error;
    delete editRomp[duplaId];
    await abaRomper();
  }catch(err){ alert(ehErroDeRede(err)?'Sem internet — a edição NÃO foi salva. Os valores continuam na tela; tente novamente quando o sinal voltar.':'Não consegui salvar a edição: '+(err.message||err)); }
}

async function confirmarRompimentos(){
  // 1 rompimento por CP com prensa preenchida.
  // idade_real = idade ajustada nesta rompida (padrão = programada); data_rompimento = hoje (system date)
  const hoje = hojeISO();
  const linhas=[];
  rompGrupos.forEach(d=>{
    const idade = idadeAtual(d);
    d.cps.forEach(c=>{
      const tf=parseFloat(String(rompInputs[c.id]||'').replace(',','.'));
      if(!isNaN(tf)&&tf>0){
        linhas.push({
          corpo_prova_id:c.id, prensa1_tf:tf, idade_real:idade,
          data_rompimento:hoje, confirmado:true, observacao:rompObs[d.duplaKey]||null
        });
      }
    });
  });
  if(!linhas.length){ alert('Lance ao menos uma prensa.'); return; }
  if(!confirm(linhas.length+' corpo(s) de prova serão rompidos e confirmados nesta data ('+fmtData(hoje)+'). Continuar?')) return;
  if(estaOffline()){ document.getElementById('wrap').insertAdjacentHTML('afterbegin', avisoSemInternet('o rompimento')); window.scrollTo(0,0); return; }
  try{
    const { error } = await sb.from('rompimentos').insert(linhas);
    if(error) throw error;
    rompFiltroData = hoje; // após romper, vê os rompidos de hoje
    await abaRomper();
    document.getElementById('wrap').insertAdjacentHTML('afterbegin',
      `<div class="card" style="text-align:center;border-color:#bcd2bf;background:#f3f9f4"><div style="font-size:34px">✓</div>
       <div style="font-weight:700;color:var(--ok)">${linhas.length} rompimento(s) confirmado(s)!</div></div>`);
  }catch(e){
    const msg = ehErroDeRede(e) ? avisoSemInternet('o rompimento') : '<div class="erro"><b>Não consegui gravar.</b><br>'+(e.message||e)+'</div>';
    document.getElementById('wrap').insertAdjacentHTML('afterbegin', msg); window.scrollTo(0,0);
  }
}

// marca os CPs de 63d liberados como descartados (grava no banco)
async function descartarLiberados(){
  if(!dispensaveis.length) return;
  const ids  = dispensaveis.flatMap(d=>d.cps.map(c=>c.id));
  const nums = dispensaveis.flatMap(d=>d.cps.map(c=>c.numero)).sort((a,b)=>a-b);
  if(!confirm(`Marcar ${ids.length} corpo(s) de prova de 63 dias como descartados?\nCP: ${nums.join(', ')}\n\nEles saem da fila de rompimento e ficam registrados como descartados.`)) return;
  if(estaOffline()){ document.getElementById('wrap').insertAdjacentHTML('afterbegin', avisoSemInternet('o descarte')); window.scrollTo(0,0); return; }
  try{
    const { error } = await sb.from('corpos_prova').update({descartado:true}).in('id', ids);
    if(error) throw error;
    await abaRomper();
    document.getElementById('wrap').insertAdjacentHTML('afterbegin',
      `<div class="card" style="text-align:center;border-color:#bcd2bf;background:#f3f9f4"><div style="font-size:34px">✓</div>
       <div style="font-weight:700;color:var(--ok)">${ids.length} corpo(s) de prova descartado(s).</div></div>`);
  }catch(e){
    const msg = ehErroDeRede(e) ? avisoSemInternet('o descarte') : '<div class="erro"><b>Não consegui descartar.</b><br>'+(e.message||e)+'</div>';
    document.getElementById('wrap').insertAdjacentHTML('afterbegin', msg); window.scrollTo(0,0);
  }
}

// ================= ABA RESULTADOS =================
let resLinhas = [];   // uma linha por DUPLA
let resFiltros = { obra:'', pav:'', dataConc:'', nf:'', conf:'', idade:'', dataRomp:'' };

async function buscarResultados(){
  // CPs (não descartados) com betoneira+concretagem+elemento+concreteira e rompimentos
  const data = await pegarTudo('corpos_prova',
      'id,numero,idade_prevista,data_prevista,descartado,betoneira_id,'+
      'betoneiras!inner(id,nota_fiscal,lacre,fck,slump_medido,agua_adicionada,volume,aceita,'+
        'concretagens!inner(id,obra_id,data_concretagem,obras!inner(nome),pavimentos!inner(id,nome),elementos(nome),concreteiras(nome))),'+
      'rompimentos(prensa1_tf,resultado_mpa,idade_real,data_rompimento,observacao)',
      q=>q.eq('descartado', false).order('numero',{ascending:true}));
  const cps=(data||[]).filter(cp=>cp.betoneiras && cp.betoneiras.aceita);
  // agrupa CPs por betoneira
  const porBt={};
  cps.forEach(cp=>{
    const b=cp.betoneiras;
    if(!porBt[b.id]) porBt[b.id]={ bt:b, cps:[] };
    porBt[b.id].cps.push(cp);
  });
  // forma duplas (por ordem de número, dentro da NF); cada dupla vira uma linha
  const linhas=[];
  Object.values(porBt).forEach(({bt,cps})=>{
    const c=bt.concretagens;
    cps.sort((a,b)=>a.numero-b.numero);
    for(let i=0;i<cps.length;i+=2){
      const par=cps.slice(i,i+2);
      // rompimentos da dupla (pega de qualquer CP do par)
      const romps=[];
      par.forEach(cp=>asArr(cp.rompimentos).forEach(r=>romps.push(r)));
      const temRomp=romps.length>0;
      // idade: do rompimento (real) se houver, senão a prevista
      const idade = temRomp ? romps[0].idade_real : (par[0].idade_prevista!=null?par[0].idade_prevista:null);
      const dataRomp = temRomp ? romps[0].data_rompimento : null;
      const obs = (romps.find(r=>r.observacao)||{}).observacao || null;
      // resultado da dupla = maior MPa entre os CPs do par
      let resultado=null;
      romps.forEach(r=>{ const m=r.resultado_mpa!=null?Number(r.resultado_mpa):(r.prensa1_tf!=null?r.prensa1_tf*MPA_PER_TF:null); if(m!=null&&(resultado==null||m>resultado)) resultado=m; });
      // conformidade
      let conf;
      if(!temRomp) conf = (par[0].idade_prevista==null)?'a_programar':'aguardando';
      else if(idade>=28) conf = (resultado>=(bt.fck||0))?'conforme':'nao';
      else conf='parcial';
      linhas.push({
        cpLabel: par.map(p=>String(p.numero).padStart(3,'0')).join('·'),
        obra:c.obras.nome, pav:c.pavimentos.nome,
        concId:c.id, obraId:c.obra_id, pavId:c.pavimentos.id,
        elemento:(c.elementos&&c.elementos.nome)||'—', concreteira:(c.concreteiras&&c.concreteiras.nome)||'—',
        nf:bt.nota_fiscal, lacre:bt.lacre||'—', fck:bt.fck,
        slump:bt.slump_medido, agua:bt.agua_adicionada, volume:bt.volume,
        moldagem:c.data_concretagem, idade, dataRomp, resultado, conf, obs,
        datasRomp: dataRomp?[dataRomp]:[]
      });
    }
  });
  // ordena por moldagem desc, depois CP
  linhas.sort((a,b)=> a.moldagem<b.moldagem?1:a.moldagem>b.moldagem?-1:(a.cpLabel<b.cpLabel?-1:1));
  return linhas;
}

async function abaResultados(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML = `<div class="officehead"><h2>Resultados</h2><p>Histórico detalhado por dupla de corpos de prova. Os filtros são cumulativos.</p></div><div class="estado">Carregando resultados…</div>`;
  try{
    resLinhas = await buscarResultados();
    resFiltros = { obra:'', pav:'', dataConc:'', nf:'', conf:'', idade:'', dataRomp:'' };
    desenharResultados();
  }catch(e){ wrap.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}

// aplica todos os filtros exceto um (para montar as opções daquele de forma cumulativa)
function resFiltrar(exceto){
  return resLinhas.filter(l=>{
    if(exceto!=='obra' && resFiltros.obra && l.obra!==resFiltros.obra) return false;
    if(exceto!=='pav' && resFiltros.pav && l.pav!==resFiltros.pav) return false;
    if(exceto!=='dataConc' && resFiltros.dataConc && l.moldagem!==resFiltros.dataConc) return false;
    if(exceto!=='nf' && resFiltros.nf && String(l.nf)!==String(resFiltros.nf)) return false;
    if(exceto!=='conf' && resFiltros.conf && l.conf!==resFiltros.conf) return false;
    if(exceto!=='idade' && resFiltros.idade && String(l.idade)!==String(resFiltros.idade)) return false;
    if(exceto!=='dataRomp' && resFiltros.dataRomp && !l.datasRomp.includes(resFiltros.dataRomp)) return false;
    return true;
  });
}
function opcoesDe(campo, exceto){
  const base = resFiltrar(exceto);
  const mapa={obra:'obra',pav:'pav',dataConc:'moldagem',nf:'nf',idade:'idade'};
  let vals;
  if(campo==='dataRomp'){ vals=[...new Set(base.flatMap(l=>l.datasRomp))]; }
  else { const k=mapa[campo]; vals=[...new Set(base.map(l=>l[k]).filter(v=>v!=null&&v!==''))]; }
  return vals;
}
function setResFiltro(campo, v){
  resFiltros[campo]=v;
  if(campo==='obra') resFiltros.pav='';
  desenharResultados();
}
function selFiltro(campo, label, valores, fmt){
  const atual=resFiltros[campo];
  let opts=`<option value="">${label}: todos</option>`;
  valores.sort((a,b)=>{ const na=Number(a), nb=Number(b); if(!isNaN(na)&&!isNaN(nb)) return na-nb; return String(a)<String(b)?-1:String(a)>String(b)?1:0; });
  valores.forEach(v=>{ opts+=`<option value="${String(v).replace(/"/g,'&quot;')}" ${String(atual)===String(v)?'selected':''}>${fmt?fmt(v):v}</option>`; });
  return `<div><label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">${label}</label>
    <select style="min-width:120px" onchange="setResFiltro('${campo}',this.value)">${opts}</select></div>`;
}
function badgeConf(s){
  if(s==='conforme') return '<span class="badge b-ok">conforme</span>';
  if(s==='nao') return '<span class="badge b-bad">não conf.</span>';
  if(s==='parcial') return '<span class="badge b-mut">parcial</span>';
  if(s==='a_programar') return '<span class="badge b-mut">a programar</span>';
  return '<span class="badge b-mut">aguardando</span>';
}
function n1(v){ return v==null?'—':Number(v).toFixed(1); }

function desenharResultados(){
  const wrap=document.getElementById('wrap');
  const lista = resFiltrar(null);
  const filtros = [
    selFiltro('obra','Obra', opcoesDe('obra','obra')),
    selFiltro('pav','Pavimento', opcoesDe('pav','pav')),
    selFiltro('dataConc','Concretagem', opcoesDe('dataConc','dataConc'), fmtData),
    selFiltro('nf','NF', opcoesDe('nf','nf')),
    selFiltro('conf','Conformidade', ['conforme','nao','parcial','aguardando','a_programar'], v=>({conforme:'Conforme',nao:'Não conforme',parcial:'Parcial',aguardando:'Aguardando',a_programar:'A programar'}[v])),
    selFiltro('idade','Idade', opcoesDe('idade','idade'), v=>v+' dias'),
    selFiltro('dataRomp','Data rompim.', opcoesDe('dataRomp','dataRomp'), fmtData),
  ].join('');

  let html=`<div class="officehead"><h2>Resultados</h2><p>Histórico detalhado por dupla. Os filtros são cumulativos — cada um refina o anterior.</p></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">${filtros}</div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn ghost" style="padding:8px 16px;font-size:13px" onclick="limparFiltrosRes()">Limpar filtros</button>
      <button class="btn" style="padding:8px 18px;font-size:13px" onclick="exportarResultadosPDF()">Exportar PDF</button>
      <span style="color:var(--muted);font-size:13px">${lista.length} dupla(s)</span>
    </div>`;

  if(!lista.length){ wrap.innerHTML=html+'<div class="estado">Nenhum resultado para os filtros selecionados.</div>'; return; }

  html += `<div style="width:100vw;margin-left:calc(50% - 50vw);padding:0 26px;box-sizing:border-box">
    <div class="card" style="padding:0;overflow:hidden">
    <table style="width:100%;font-size:13px"><thead><tr>
      <th style="width:80px">CP</th><th>Obra</th><th>Pav</th><th>Elemento</th><th>Concreteira</th>
      <th>NF</th><th>Lacre</th><th>Fck <span style="font-weight:400;text-transform:none">(MPa)</span></th>
      <th>Slump <span style="font-weight:400;text-transform:none">(cm)</span></th>
      <th>Água <span style="font-weight:400;text-transform:none">(L)</span></th>
      <th>Vol <span style="font-weight:400;text-transform:none">(m³)</span></th>
      <th>Moldagem</th><th>Idade</th><th>Rompim.</th>
      <th>Result. <span style="font-weight:400;text-transform:none">(MPa)</span></th><th>Conf.</th><th>Obs</th>
    </tr></thead><tbody>`;
  lista.forEach(l=>{
    const naoConf = l.conf==='nao';
    html += `<tr ${naoConf?'style="background:#fdf1ee"':''}>
      <td><span class="cpchip" style="font-size:14px;padding:6px 9px;min-width:auto">${l.cpLabel}</span></td>
      <td>${l.obra}</td><td style="font-size:12px">${(() => {
        if(!perfisUsuario.includes('admin')) return l.pav;
        if(pavEditId===l.concId){
          const pavs=pavCacheObra[l.obraId]||[];
          const opts=pavs.map(p=>`<option value="${p.id}" ${p.id===l.pavId?'selected':''}>${p.nome}</option>`).join('');
          return `<select onchange="salvarPavimento(${l.concId}, this.value, ${l.obraId})" style="padding:6px 8px;font-size:12px;max-width:170px">${opts}</select>`+
            `<button onclick="cancelarEditaPav()" style="background:none;border:0;color:var(--muted);cursor:pointer;margin-left:4px" title="cancelar">✕</button>`;
        }
        return `<button onclick="editarPavimento(${l.concId}, ${l.obraId})" style="background:none;border:0;color:var(--accent);font-weight:600;cursor:pointer;padding:0;text-align:left;text-decoration:underline dotted" title="Clique para corrigir o pavimento (admin)">${l.pav} ✎</button>`;
      })()}</td>
      <td style="font-size:12px">${l.elemento}</td><td style="font-size:12px">${l.concreteira}</td>
      <td class="mono">${l.nf}</td><td class="mono">${l.lacre}</td><td class="mono">${l.fck||'—'}</td>
      <td class="mono">${n1(l.slump)}</td><td class="mono">${n1(l.agua)}</td><td class="mono">${n1(l.volume)}</td>
      <td class="mono">${fmtData(l.moldagem)}</td><td class="mono">${l.idade!=null?l.idade+'d':'—'}</td>
      <td class="mono">${l.dataRomp?fmtData(l.dataRomp):'—'}</td>
      <td class="mono"><b>${n1(l.resultado)}</b></td>
      <td>${badgeConf(l.conf)}</td>
      <td style="font-size:12px">${l.obs||'<span class="muted">—</span>'}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  wrap.innerHTML = html;
}
function limparFiltrosRes(){ resFiltros={ obra:'', pav:'', dataConc:'', nf:'', conf:'', idade:'', dataRomp:'' }; desenharResultados(); }

function nomeConf(s){ return {conforme:'Conforme',nao:'Não conforme',parcial:'Parcial',aguardando:'Aguardando',a_programar:'A programar'}[s]||s; }
function resumoFiltrosTxt(){
  const p=[];
  if(resFiltros.obra) p.push('Obra: '+resFiltros.obra);
  if(resFiltros.pav) p.push('Pavimento: '+resFiltros.pav);
  if(resFiltros.dataConc) p.push('Concretagem: '+fmtData(resFiltros.dataConc));
  if(resFiltros.nf) p.push('NF: '+resFiltros.nf);
  if(resFiltros.conf) p.push('Conformidade: '+nomeConf(resFiltros.conf));
  if(resFiltros.idade) p.push('Idade: '+resFiltros.idade+' dias');
  if(resFiltros.dataRomp) p.push('Rompimento: '+fmtData(resFiltros.dataRomp));
  return p.length ? p.join('   ·   ') : 'Todos os registros (sem filtro)';
}
function exportarResultadosPDF(){
  if(!window.jspdf || !window.jspdf.jsPDF){ alert('A biblioteca de PDF não carregou. Verifique a conexão e recarregue a página.'); return; }
  const lista = resFiltrar(null);
  if(!lista.length){ alert('Não há resultados para exportar com os filtros atuais.'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  const pageW = doc.internal.pageSize.getWidth();
  const accent=[189,93,39], ink=[14,14,14], muted=[122,116,106];
  const hoje = new Date();
  const dataGer = String(hoje.getDate()).padStart(2,'0')+'/'+String(hoje.getMonth()+1).padStart(2,'0')+'/'+hoje.getFullYear();

  // ---- cabeçalho ----
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(ink[0],ink[1],ink[2]);
  doc.text('GT&ABC · Controle Tecnológico de Concreto', 10, 14);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(accent[0],accent[1],accent[2]);
  doc.text('Relatório de Resultados', 10, 20);
  doc.setFontSize(8); doc.setTextColor(muted[0],muted[1],muted[2]);
  doc.text('Gerado em '+dataGer, pageW-10, 14, {align:'right'});

  // ---- filtros + resumo ----
  doc.setFontSize(8); doc.setTextColor(ink[0],ink[1],ink[2]);
  doc.text('Filtros: '+resumoFiltrosTxt(), 10, 26);
  const nConf=lista.filter(l=>l.conf==='conforme').length;
  const nNao =lista.filter(l=>l.conf==='nao').length;
  const nParc=lista.filter(l=>l.conf==='parcial').length;
  doc.setTextColor(muted[0],muted[1],muted[2]);
  doc.text(lista.length+' dupla(s)   ·   '+nConf+' conforme   ·   '+nNao+' não conforme   ·   '+nParc+' parcial', 10, 31);

  // ---- tabela ----
  const head=[['CP','Obra','Pav','Elemento','Concreteira','NF','Lacre','Fck (MPa)','Slump (cm)','Água (L)','Vol (m³)','Moldagem','Idade','Rompim.','Result. (MPa)','Conf.','Obs']];
  const body=lista.map(l=>[
    l.cpLabel, l.obra, l.pav, l.elemento, l.concreteira, String(l.nf), String(l.lacre),
    l.fck||'—', n1(l.slump), n1(l.agua), n1(l.volume),
    fmtData(l.moldagem), (l.idade!=null?l.idade+'d':'—'),
    (l.dataRomp?fmtData(l.dataRomp):'—'), n1(l.resultado), nomeConf(l.conf), (l.obs||'—')
  ]);

  doc.autoTable({
    head, body, startY:35, theme:'grid',
    styles:{ font:'helvetica', fontSize:7, cellPadding:1.6, overflow:'linebreak', lineColor:[234,226,198], lineWidth:0.1, textColor:[14,14,14] },
    headStyles:{ fillColor:accent, textColor:[255,255,255], fontStyle:'bold', fontSize:7, halign:'left' },
    alternateRowStyles:{ fillColor:[255,253,244] },
    columnStyles:{
      0:{cellWidth:17, fontStyle:'bold'},
      5:{cellWidth:13}, 6:{cellWidth:13},
      7:{halign:'right',cellWidth:13}, 8:{halign:'right',cellWidth:13}, 9:{halign:'right',cellWidth:12}, 10:{halign:'right',cellWidth:12},
      12:{halign:'center',cellWidth:10}, 14:{halign:'right',fontStyle:'bold',cellWidth:14}
    },
    margin:{left:10, right:10},
    didParseCell:(d)=>{
      const row = lista[d.row.index];
      if(d.section==='body' && row){
        if(row.conf==='nao') d.cell.styles.fillColor=[253,241,238];
        if(d.column.index===15){
          if(row.conf==='conforme'){ d.cell.styles.textColor=[63,148,90]; d.cell.styles.fontStyle='bold'; }
          else if(row.conf==='nao'){ d.cell.styles.textColor=[176,42,32]; d.cell.styles.fontStyle='bold'; }
          else { d.cell.styles.textColor=[122,116,106]; }
        }
      }
    },
    didDrawPage:()=>{
      const ph=doc.internal.pageSize.getHeight();
      doc.setFontSize(7); doc.setTextColor(muted[0],muted[1],muted[2]); doc.setFont('helvetica','normal');
      doc.text('GT Home & ABC — Controle Tecnológico de Concreto', 10, ph-6);
      doc.text('Página '+doc.internal.getNumberOfPages(), pageW-10, ph-6, {align:'right'});
    }
  });

  doc.save('resultados_concreto_'+hoje.toISOString().slice(0,10)+'.pdf');
}

// ---- INÍCIO ----
async function iniciar(){
  root.innerHTML = '<div class="estado">Carregando…</div>';
  let _erroCracha = '';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ _erroCracha = 'Sessão não encontrada. Saia e entre novamente.'; }
    else {
      const { data, error } = await sb.rpc('meus_perfis');
      if(error) _erroCracha = error.message;
      else perfisUsuario = Array.isArray(data) ? data : [];
    }
  }catch(e){ _erroCracha = (e && e.message) ? e.message : String(e); }
  if(!perfisUsuario.some(p=>PERFIS_OK.includes(p))){ telaSemAcesso(_erroCracha); return; }
  render();
}
function telaSemAcesso(msg){
  root.innerHTML = `
    <div class="login-wrap"><div class="login-box" style="text-align:center">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Sem acesso</div>
      <div class="login-sub" style="margin-bottom:14px">O usuário ${userEmail} não tem permissão para o Laboratório${perfisUsuario.length?` (perfil: ${perfisUsuario.join(', ')})`:''}.<br>Fale com a administradora.</div>
      ${msg?`<div class="login-sub" style="font-size:12px;color:#b02a20;margin-bottom:14px">detalhe técnico: ${msg}</div>`:''}
      <button class="btn" onclick="sair()">Sair</button>
    </div></div>`;
}
(async function(){
  const { data } = await sb.auth.getSession();
  if(data.session){ userEmail=data.session.user.email; iniciar(); }
  else telaLogin('');
})();
