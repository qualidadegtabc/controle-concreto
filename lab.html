<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laboratório · Controle de Concreto</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFFBEE; --card:#FFFEF8; --ink:#0E0E0E; --muted:#7A746A;
  --line:#EAE2C6; --accent:#BD5D27; --accent-ink:#8E4319; --accent-soft:#F7E7D7;
  --ok:#3F945A; --warn:#FAA21B; --bad:#B02A20; --head:#F1EFE7;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Montserrat",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}

.topbar{background:var(--ink);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:14px}
.topbar .logo{font-weight:800;border:2px solid #fff;border-radius:8px;padding:4px 10px;font-size:14px;letter-spacing:.4px}
.topbar .ttl{font-weight:700;font-size:17px}
.topbar .co{font-size:12px;color:#cfc9bd}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:13px;color:#cfc9bd}
.topbar .sair{background:none;border:0;color:#fff;font-weight:700;font-size:13px;text-decoration:underline}

.tabs{display:flex;gap:8px;padding:16px 26px 0;border-bottom:1px solid var(--line);background:#fff}
.tab{padding:12px 22px;border:0;background:none;font-weight:700;font-size:15px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}

.wrap{max-width:1100px;margin:0 auto;padding:26px}
.officehead h2{font-size:22px;margin:0 0 4px}
.officehead p{color:var(--muted);margin:0 0 20px;font-size:14px}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.card .ch{font-weight:700;font-size:16px;margin-bottom:4px}
.card .cs{color:var(--muted);font-size:13px;margin-bottom:14px}

table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--head);text-align:left;padding:11px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#524d44;font-weight:700;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
select,input{font-size:15px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23BD5D27' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:34px}

.btn{padding:13px 26px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px}
.btn:disabled{opacity:.6}
.btn.ghost{background:#fff;color:var(--accent-ink);border:2px solid var(--accent)}
.estado{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;line-height:1.6}
.erro{background:#fde8e2;border:1px solid #e0b09f;color:#8a3220;border-radius:10px;padding:14px;font-size:14px;margin-bottom:16px}

/* login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px}
.login-box{width:100%;max-width:380px}
.login-logo{font-weight:800;border:3px solid var(--ink);border-radius:12px;padding:10px 16px;font-size:22px;text-align:center;width:fit-content;margin:0 auto 10px}
.login-tit{color:var(--accent);font-size:20px;font-weight:700;text-align:center}
.login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:22px}
.login-box label{display:block;font-size:13px;font-weight:700;margin:0 0 6px}
.login-box input{width:100%;margin-bottom:14px;min-height:50px}
.login-box .btn{width:100%}
.chip{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);border:1px solid #e3c3a6;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="root"><div class="estado">Carregando…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://anzggndtjtwwrbxfguvm.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuemdnbmR0anR3d3JieGZndXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDU2MDcsImV4cCI6MjA5NTgyMTYwN30.Jcx-wvWnMAtKg1epCsTV3RGlW01nw4RSDy4RvYIm78Q";
const sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
const root = document.getElementById('root');
let userEmail='';
let abaAtual='programar';

// ---- helpers de data ----
function addDiasISO(dataISO, dias){ const d=new Date(dataISO+'T00:00:00'); d.setDate(d.getDate()+(+dias)); return d.toISOString().slice(0,10); }
function fmtData(iso){ if(!iso) return '—'; const[a,m,d]=iso.split('-'); return `${d}/${m}/${a}`; }

// ---- LOGIN ----
function telaLogin(msg){
  root.innerHTML = `
    <div class="login-wrap"><div class="login-box">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Laboratório</div>
      <div class="login-sub">Controle Tecnológico de Concreto</div>
      <label>E-mail</label><input id="li_email" type="email" autocapitalize="off" placeholder="seu@email.com">
      <label>Senha</label><input id="li_senha" type="password" placeholder="••••••••">
      ${msg?`<div class="erro">${msg}</div>`:''}
      <button class="btn" id="li_btn" onclick="entrar()">Entrar</button>
    </div></div>`;
}
async function entrar(){
  const email=document.getElementById('li_email').value.trim();
  const senha=document.getElementById('li_senha').value;
  if(!email||!senha){ telaLogin('Preencha e-mail e senha.'); return; }
  const btn=document.getElementById('li_btn'); btn.disabled=true; btn.textContent='Entrando…';
  const { data, error } = await sb.auth.signInWithPassword({email,password:senha});
  if(error){ telaLogin('Não consegui entrar: '+error.message); return; }
  userEmail=data.user.email; iniciar();
}
async function sair(){ await sb.auth.signOut(); userEmail=''; telaLogin(''); }

// ---- CASCA ----
function casca(){
  return `
    <div class="topbar">
      <div class="logo">GT&amp;ABC</div>
      <div><div class="ttl">Laboratório</div><div class="co">Controle Tecnológico de Concreto</div></div>
      <div class="right"><span>${userEmail}</span><button class="sair" onclick="sair()">Sair</button></div>
    </div>
    <div class="tabs">
      <button class="tab ${abaAtual==='programar'?'on':''}" onclick="irAba('programar')">Programar idades</button>
      <button class="tab ${abaAtual==='romper'?'on':''}" onclick="irAba('romper')">Romper</button>
      <button class="tab ${abaAtual==='resultados'?'on':''}" onclick="irAba('resultados')">Resultados</button>
    </div>
    <div class="wrap" id="wrap"></div>`;
}
function irAba(a){ abaAtual=a; render(); }
function render(){
  root.innerHTML = casca();
  if(abaAtual==='programar') abaProgramar();
  else document.getElementById('wrap').innerHTML = `<div class="estado">Esta aba será construída em breve. 🔧</div>`;
}

// ---- PROGRAMAR IDADES (por traço, com padrão da 1ª betoneira) ----
let progGrupos=[], progEscolhas={};
// busca CPs sem idade, monta: concretagem -> traço(fck) -> betoneiras(NF) -> duplas
async function buscarParaProgramar(){
  const { data, error } = await sb.from('corpos_prova')
    .select('id,numero,idade_prevista,betoneira_id,betoneiras!inner(id,nota_fiscal,fck,concretagem_id,criado_em,concretagens!inner(id,data_concretagem,obras!inner(nome),pavimentos!inner(nome)))')
    .is('idade_prevista', null).eq('descartado', false).order('numero',{ascending:true});
  if(error) throw error;

  // 1) agrupa CPs por betoneira
  const bts={};
  (data||[]).forEach(cp=>{
    const b=cp.betoneiras, c=b.concretagens;
    if(!bts[b.id]) bts[b.id]={betoneiraId:b.id, nf:b.nota_fiscal, fck:b.fck, criado:b.criado_em,
      concId:c.id, obra:c.obras.nome, pav:c.pavimentos.nome, data:c.data_concretagem, cps:[]};
    bts[b.id].cps.push({id:cp.id, numero:cp.numero});
  });
  // forma duplas por betoneira (par na ordem; ímpar sobra 1)
  Object.values(bts).forEach(b=>{ b.cps.sort((x,y)=>x.numero-y.numero); b.duplas=[]; for(let i=0;i<b.cps.length;i+=2) b.duplas.push(b.cps.slice(i,i+2)); b.nDuplas=b.duplas.length; });

  // 2) agrupa betoneiras por (concretagem + fck = traço)
  const tracos={};
  Object.values(bts).forEach(b=>{
    const chave = b.concId+'|'+b.fck;
    if(!tracos[chave]) tracos[chave]={concId:b.concId, fck:b.fck, obra:b.obra, pav:b.pav, data:b.data, betoneiras:[]};
    tracos[chave].betoneiras.push(b);
  });

  // 3) em cada traço: 1ª betoneira (mais antiga) define o padrão; separa avulsas (qtd de duplas diferente)
  const grupos=Object.values(tracos).map(t=>{
    t.betoneiras.sort((a,b)=> (a.criado<b.criado?-1:a.criado>b.criado?1:0));
    const padraoN = t.betoneiras[0].nDuplas;
    t.padraoN = padraoN;
    t.noPadrao = t.betoneiras.filter(b=>b.nDuplas===padraoN);
    t.avulsas  = t.betoneiras.filter(b=>b.nDuplas!==padraoN);
    return t;
  });
  grupos.sort((a,b)=> a.data<b.data?1:a.data>b.data?-1:0);
  return grupos;
}
async function abaProgramar(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML = `<div class="officehead"><h2>Programar idades</h2><p>Defina o padrão de idades por traço. As demais notas fiscais do mesmo traço (com a mesma quantidade de duplas) herdam o padrão; as diferentes aparecem para programar à parte.</p></div><div class="estado">Buscando corpos de prova…</div>`;
  try{ progGrupos=await buscarParaProgramar(); progEscolhas={}; desenharProgramar(); }
  catch(e){ wrap.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}
const IDADES=[3,4,7,28,63];
function selIdade(chave){
  const opts=IDADES.map(x=>`<option value="${x}" ${progEscolhas[chave]==x?'selected':''}>${x} dias</option>`).join('');
  return `<select onchange="progEscolhas['${chave}']=+this.value;desenharProgramar()"><option value="" ${!progEscolhas[chave]?'selected':''} disabled>idade…</option>${opts}</select>`;
}
function desenharProgramar(){
  const wrap=document.getElementById('wrap');
  let html=`<div class="officehead"><h2>Programar idades</h2><p>Defina o padrão de idades por traço. NFs do mesmo traço com a mesma quantidade de duplas herdam o padrão; as diferentes ficam à parte.</p></div>`;
  if(!progGrupos.length){ wrap.innerHTML=html+'<div class="estado">Nenhum corpo de prova aguardando programação. 🎉</div>'; return; }

  progGrupos.forEach((t,ti)=>{
    // ----- bloco do TRAÇO (padrão) -----
    const nfList = t.noPadrao.map(b=>'NF '+b.nf).join(', ');
    html += `<div class="card"><div class="ch">${t.obra} · ${t.pav} — Traço Fck ${t.fck||'—'}</div>
      <div class="cs">moldagem ${fmtData(t.data)} · padrão definido pela 1ª betoneira (${t.padraoN} dupla${t.padraoN>1?'s':''}) · aplica a: ${nfList}</div>
      <table><thead><tr><th style="width:130px">Posição</th><th style="width:200px">Idade (padrão)</th><th>Data prevista</th></tr></thead><tbody>`;
    for(let pos=0; pos<t.padraoN; pos++){
      const chave='T'+ti+':'+pos;
      const prev = progEscolhas[chave]? fmtData(addDiasISO(t.data, progEscolhas[chave])) : '—';
      html += `<tr><td style="font-weight:700">${pos+1}ª dupla</td><td>${selIdade(chave)}</td><td class="mono">${prev}</td></tr>`;
    }
    html += `</tbody></table>`;
    // mostra quais CPs recebem (resumo)
    const exemplo = t.noPadrao.map(b=>`NF ${b.nf}: ${b.duplas.map(d=>d.map(c=>c.numero).join('·')).join(' / ')}`).join(' &nbsp;|&nbsp; ');
    html += `<div class="cs" style="margin-top:10px">Duplas: ${exemplo}</div></div>`;

    // ----- blocos AVULSOS (qtd de duplas diferente do padrão) -----
    t.avulsas.forEach(b=>{
      html += `<div class="card" style="border-style:dashed"><div class="ch">${t.obra} · ${t.pav} — NF ${b.nf} <span class="chip">avulsa</span></div>
        <div class="cs">Fck ${b.fck||'—'} · ${b.nDuplas} dupla(s) — quantidade diferente do padrão do traço, programe à parte</div>
        <table><thead><tr><th style="width:160px">Dupla (CP)</th><th style="width:200px">Idade</th><th>Data prevista</th></tr></thead><tbody>`;
      b.duplas.forEach((d,di)=>{
        const chave='A'+b.betoneiraId+':'+di, nums=d.map(c=>c.numero).join(' e ');
        const prev = progEscolhas[chave]? fmtData(addDiasISO(t.data, progEscolhas[chave])) : '—';
        html += `<tr><td class="mono" style="font-weight:700">${nums}</td><td>${selIdade(chave)}</td><td class="mono">${prev}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  });
  html+=`<button class="btn" onclick="salvarProgramacao()">Salvar programação</button>`;
  wrap.innerHTML=html;
}
async function salvarProgramacao(){
  const updates=[];
  progGrupos.forEach((t,ti)=>{
    // padrão: cada posição -> aplica à dupla correspondente de cada NF no padrão
    for(let pos=0; pos<t.padraoN; pos++){
      const idade=progEscolhas['T'+ti+':'+pos];
      if(!idade) continue;
      const dp=addDiasISO(t.data, idade);
      t.noPadrao.forEach(b=>{
        const dupla=b.duplas[pos];
        if(dupla) dupla.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    }
    // avulsas
    t.avulsas.forEach(b=>{
      b.duplas.forEach((d,di)=>{
        const idade=progEscolhas['A'+b.betoneiraId+':'+di];
        if(!idade) return;
        const dp=addDiasISO(t.data, idade);
        d.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    });
  });
  if(!updates.length){ alert('Escolha a idade de ao menos uma dupla.'); return; }
  try{
    const res=await Promise.all(updates.map(u=>sb.from('corpos_prova').update({idade_prevista:u.idade_prevista,data_prevista:u.data_prevista}).eq('id',u.id)));
    for(const r of res) if(r.error) throw r.error;
    const wrap=document.getElementById('wrap');
    wrap.innerHTML=`<div class="officehead"><h2>Programar idades</h2></div>
      <div class="card" style="text-align:center"><div style="font-size:44px">✓</div>
      <div style="font-weight:700;font-size:18px;color:var(--ok);margin:6px 0">Idades programadas!</div>
      <div class="cs">${updates.length} corpo(s) de prova com data de rompimento definida.</div>
      <button class="btn" onclick="abaProgramar()" style="margin-top:8px">Programar mais</button></div>`;
  }catch(e){ document.getElementById('wrap').insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui salvar.</b><br>'+(e.message||e)+'</div>'); }
}

// ---- INÍCIO ----
function iniciar(){ render(); }
(async function(){
  const { data } = await sb.auth.getSession();
  if(data.session){ userEmail=data.session.user.email; iniciar(); }
  else telaLogin('');
})();
</script>
</body>
