// ---- PROGRAMAR IDADES (por traço, com padrão da 1ª betoneira) ----
let progGrupos=[], progEscolhas={};
// busca CPs sem idade, monta: concretagem -> traço(fck) -> betoneiras(NF) -> duplas
async function buscarParaProgramar(){
  const { data, error } = await sb.from('corpos_prova')
    .select('id,numero,idade_prevista,betoneira_id,betoneiras!inner(id,nota_fiscal,fck,concretagem_id,criado_em,concretagens!inner(id,data_concretagem,obras!inner(nome),pavimentos!inner(nome)))')
    .is('idade_prevista', null).eq('descartado', false).order('numero',{ascending:true});
  if(error) throw error;

  // 1) agrupa CPs por betoneira
  const bts={};
  (data||[]).forEach(cp=>{
    const b=cp.betoneiras, c=b.concretagens;
    if(!bts[b.id]) bts[b.id]={betoneiraId:b.id, nf:b.nota_fiscal, fck:b.fck, criado:b.criado_em,
      concId:c.id, obra:c.obras.nome, pav:c.pavimentos.nome, data:c.data_concretagem, cps:[]};
    bts[b.id].cps.push({id:cp.id, numero:cp.numero});
  });
  // forma duplas por betoneira (par na ordem; ímpar sobra 1)
  Object.values(bts).forEach(b=>{ b.cps.sort((x,y)=>x.numero-y.numero); b.duplas=[]; for(let i=0;i<b.cps.length;i+=2) b.duplas.push(b.cps.slice(i,i+2)); b.nDuplas=b.duplas.length; });

  // 2) agrupa betoneiras por (concretagem + fck = traço)
  const tracos={};
  Object.values(bts).forEach(b=>{
    const chave = b.concId+'|'+b.fck;
    if(!tracos[chave]) tracos[chave]={concId:b.concId, fck:b.fck, obra:b.obra, pav:b.pav, data:b.data, betoneiras:[]};
    tracos[chave].betoneiras.push(b);
  });

  // 3) em cada traço: 1ª betoneira (mais antiga) define o padrão; separa avulsas (qtd de duplas diferente)
  const grupos=Object.values(tracos).map(t=>{
    t.betoneiras.sort((a,b)=> (a.criado<b.criado?-1:a.criado>b.criado?1:0));
    const padraoN = t.betoneiras[0].nDuplas;
    t.padraoN = padraoN;
    t.noPadrao = t.betoneiras.filter(b=>b.nDuplas===padraoN);
    t.avulsas  = t.betoneiras.filter(b=>b.nDuplas!==padraoN);
    return t;
  });
  grupos.sort((a,b)=> a.data<b.data?1:a.data>b.data?-1:0);
  return grupos;
}
async function abaProgramar(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML = `<div class="officehead"><h2>Programar idades</h2><p>Defina o padrão de idades por traço. As demais notas fiscais do mesmo traço (com a mesma quantidade de duplas) herdam o padrão; as diferentes aparecem para programar à parte.</p></div><div class="estado">Buscando corpos de prova…</div>`;
  try{ progGrupos=await buscarParaProgramar(); progEscolhas={}; desenharProgramar(); }
  catch(e){ wrap.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}
const IDADES=[3,4,7,28,63];
function selIdade(chave){
  const opts=IDADES.map(x=>`<option value="${x}" ${progEscolhas[chave]==x?'selected':''}>${x} dias</option>`).join('');
  return `<select onchange="progEscolhas['${chave}']=+this.value;desenharProgramar()"><option value="" ${!progEscolhas[chave]?'selected':''} disabled>idade…</option>${opts}</select>`;
}
function desenharProgramar(){
  const wrap=document.getElementById('wrap');
  let html=`<div class="officehead"><h2>Programar idades</h2><p>Defina o padrão de idades por traço. NFs do mesmo traço com a mesma quantidade de duplas herdam o padrão; as diferentes ficam à parte.</p></div>`;
  if(!progGrupos.length){ wrap.innerHTML=html+'<div class="estado">Nenhum corpo de prova aguardando programação. 🎉</div>'; return; }

  progGrupos.forEach((t,ti)=>{
    // ----- bloco do TRAÇO (padrão) -----
    const nfList = t.noPadrao.map(b=>'NF '+b.nf).join(', ');
    html += `<div class="card"><div class="ch">${t.obra} · ${t.pav} — Traço Fck ${t.fck||'—'}</div>
      <div class="cs">moldagem ${fmtData(t.data)} · padrão definido pela 1ª betoneira (${t.padraoN} dupla${t.padraoN>1?'s':''}) · aplica a: ${nfList}</div>
      <table><thead><tr><th style="width:130px">Posição</th><th style="width:200px">Idade (padrão)</th><th>Data prevista</th></tr></thead><tbody>`;
    for(let pos=0; pos<t.padraoN; pos++){
      const chave='T'+ti+':'+pos;
      const prev = progEscolhas[chave]? fmtData(addDiasISO(t.data, progEscolhas[chave])) : '—';
      html += `<tr><td style="font-weight:700">${pos+1}ª dupla</td><td>${selIdade(chave)}</td><td class="mono">${prev}</td></tr>`;
    }
    html += `</tbody></table>`;
    // mostra quais CPs recebem (resumo)
    const exemplo = t.noPadrao.map(b=>`NF ${b.nf}: ${b.duplas.map(d=>d.map(c=>c.numero).join('·')).join(' / ')}`).join(' &nbsp;|&nbsp; ');
    html += `<div class="cs" style="margin-top:10px">Duplas: ${exemplo}</div></div>`;

    // ----- blocos AVULSOS (qtd de duplas diferente do padrão) -----
    t.avulsas.forEach(b=>{
      html += `<div class="card" style="border-style:dashed"><div class="ch">${t.obra} · ${t.pav} — NF ${b.nf} <span class="chip">avulsa</span></div>
        <div class="cs">Fck ${b.fck||'—'} · ${b.nDuplas} dupla(s) — quantidade diferente do padrão do traço, programe à parte</div>
        <table><thead><tr><th style="width:160px">Dupla (CP)</th><th style="width:200px">Idade</th><th>Data prevista</th></tr></thead><tbody>`;
      b.duplas.forEach((d,di)=>{
        const chave='A'+b.betoneiraId+':'+di, nums=d.map(c=>c.numero).join(' e ');
        const prev = progEscolhas[chave]? fmtData(addDiasISO(t.data, progEscolhas[chave])) : '—';
        html += `<tr><td class="mono" style="font-weight:700">${nums}</td><td>${selIdade(chave)}</td><td class="mono">${prev}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  });
  html+=`<button class="btn" onclick="salvarProgramacao()">Salvar programação</button>`;
  wrap.innerHTML=html;
}
async function salvarProgramacao(){
  const updates=[];
  progGrupos.forEach((t,ti)=>{
    // padrão: cada posição -> aplica à dupla correspondente de cada NF no padrão
    for(let pos=0; pos<t.padraoN; pos++){
      const idade=progEscolhas['T'+ti+':'+pos];
      if(!idade) continue;
      const dp=addDiasISO(t.data, idade);
      t.noPadrao.forEach(b=>{
        const dupla=b.duplas[pos];
        if(dupla) dupla.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    }
    // avulsas
    t.avulsas.forEach(b=>{
      b.duplas.forEach((d,di)=>{
        const idade=progEscolhas['A'+b.betoneiraId+':'+di];
        if(!idade) return;
        const dp=addDiasISO(t.data, idade);
        d.forEach(cp=>updates.push({id:cp.id, idade_prevista:idade, data_prevista:dp}));
      });
    });
  });
  if(!updates.length){ alert('Escolha a idade de ao menos uma dupla.'); return; }
  try{
    const res=await Promise.all(updates.map(u=>sb.from('corpos_prova').update({idade_prevista:u.idade_prevista,data_prevista:u.data_prevista}).eq('id',u.id)));
    for(const r of res) if(r.error) throw r.error;
    const wrap=document.getElementById('wrap');
    wrap.innerHTML=`<div class="officehead"><h2>Programar idades</h2></div>
      <div class="card" style="text-align:center"><div style="font-size:44px">✓</div>
      <div style="font-weight:700;font-size:18px;color:var(--ok);margin:6px 0">Idades programadas!</div>
      <div class="cs">${updates.length} corpo(s) de prova com data de rompimento definida.</div>
      <button class="btn" onclick="abaProgramar()" style="margin-top:8px">Programar mais</button></div>`;
  }catch(e){ document.getElementById('wrap').insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui salvar.</b><br>'+(e.message||e)+'</div>'); }
}

// ---- ROMPER ----
const MPA_PER_TF = 1.2486;
let rompData = '';          // data de rompimento padrão (ISO)
let rompGrupos = [];        // duplas a romper
let rompInputs = {};        // { cpId: tf }
let rompObs = {};           // { duplaKey: obs }
let rompFiltroObra = 'Todas';
let rompidosDia = [];       // rompimentos já confirmados na data do filtro
let editRomp = {};          // edições em aberto: { duplaId: {...} }
let rompIdade = {};         // { duplaKey: idade ajustada nesta rompida }

function hojeISO(){ return new Date().toISOString().slice(0,10); }

async function buscarParaRomper(dataLimiteISO){
  // CPs com idade programada, não rompidos ainda, data_prevista <= limite
  const { data, error } = await sb.from('corpos_prova')
    .select('id,numero,idade_prevista,data_prevista,betoneira_id,betoneiras!inner(id,nota_fiscal,fck,concretagens!inner(id,data_concretagem,obras!inner(nome),pavimentos!inner(nome))),rompimentos(id)')
    .not('idade_prevista','is',null)
    .eq('descartado',false)
    .lte('data_prevista', dataLimiteISO)
    .order('numero',{ascending:true});
  if(error) throw error;
  // filtra os que ainda NÃO têm rompimento confirmado
  const semRomp = (data||[]).filter(cp=> !cp.rompimentos || cp.rompimentos.length===0);
  // agrupa por betoneira + idade (duplas irmãs com mesma idade prevista)
  const grp={};
  semRomp.forEach(cp=>{
    const b=cp.betoneiras, c=b.concretagens;
    const chave=b.id+'|'+cp.idade_prevista+'|'+cp.data_prevista;
    if(!grp[chave]) grp[chave]={ key:chave, betoneiraId:b.id, nf:b.nota_fiscal, fck:b.fck,
      obra:c.obras.nome, pav:c.pavimentos.nome, idade:cp.idade_prevista, prevista:cp.data_prevista, moldagem:c.data_concretagem, cps:[] };
    grp[chave].cps.push({id:cp.id, numero:cp.numero});
  });
  // forma duplas dentro de cada grupo (par na ordem; ímpar sobra 1)
  const grupos=Object.values(grp);
  const duplas=[];
  grupos.forEach(g=>{
    g.cps.sort((a,b)=>a.numero-b.numero);
    for(let i=0;i<g.cps.length;i+=2){
      const par=g.cps.slice(i,i+2);
      duplas.push({ ...g, cps:par, duplaKey:g.key+':'+i });
    }
  });
  // ordena por data prevista (mais antigos/atrasados primeiro), depois número
  duplas.sort((a,b)=> a.prevista<b.prevista?-1:a.prevista>b.prevista?1:(a.cps[0].numero-b.cps[0].numero));
  return duplas;
}

// rompimentos já confirmados na data escolhida (agrupados por dupla)
async function buscarRompidosDia(dataISO){
  const { data, error } = await sb.from('rompimentos')
    .select('id,prensa1_tf,resultado_mpa,idade_real,data_rompimento,observacao,corpo_prova_id,corpos_prova!inner(numero,betoneira_id,betoneiras!inner(nota_fiscal,fck,concretagens!inner(obras!inner(nome),pavimentos!inner(nome))))')
    .eq('data_rompimento', dataISO)
    .order('id',{ascending:true});
  if(error) throw error;
  const itens = (data||[]).map(r=>{
    const cp=r.corpos_prova, b=cp.betoneiras, c=b.concretagens;
    return { rompId:r.id, cpId:r.corpo_prova_id, numero:cp.numero, betoneiraId:cp.betoneira_id,
      nf:b.nota_fiscal, fck:b.fck, obra:c.obras.nome, pav:c.pavimentos.nome,
      idade:r.idade_real, tf:r.prensa1_tf, mpa:r.resultado_mpa, obs:r.observacao };
  });
  // agrupa por betoneira + idade_real; forma duplas por ordem de número
  const grp={};
  itens.forEach(it=>{
    const chave=it.betoneiraId+'|'+it.idade;
    if(!grp[chave]) grp[chave]={ chave, nf:it.nf, fck:it.fck, obra:it.obra, pav:it.pav, idade:it.idade, itens:[] };
    grp[chave].itens.push(it);
  });
  const duplas=[];
  Object.values(grp).forEach(g=>{
    g.itens.sort((a,b)=>a.numero-b.numero);
    for(let i=0;i<g.itens.length;i+=2){
      const par=g.itens.slice(i,i+2);
      const mpaVals=par.map(x=>x.mpa!=null?Number(x.mpa):(x.tf!=null?x.tf*MPA_PER_TF:null)).filter(v=>v!=null);
      duplas.push({ ...g, itens:par, duplaId:g.chave+':'+i, resultado: mpaVals.length?Math.max(...mpaVals):null });
    }
  });
  return duplas;
}

async function abaRomper(){
  const wrap=document.getElementById('wrap');
  if(!rompData) rompData = hojeISO();
  wrap.innerHTML = `<div class="officehead"><h2>Romper</h2><p>Lance as prensas (tf) de cada corpo de prova. O resultado em MPa e a conformidade são calculados automaticamente.</p></div><div class="estado">Buscando corpos de prova…</div>`;
  try{
    rompGrupos = await buscarParaRomper(rompData);
    rompidosDia = await buscarRompidosDia(rompData);
    rompInputs={}; rompObs={}; rompIdade={}; editRomp={};
    desenharRomper();
  }catch(e){ wrap.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}

function previaMPa(cpId){
  const tf = parseFloat(String(rompInputs[cpId]||'').replace(',','.'));
  if(isNaN(tf)||tf<=0) return null;
  return tf*MPA_PER_TF;
}
function resultadoDupla(d){
  const vals = d.cps.map(c=>previaMPa(c.id)).filter(v=>v!=null);
  if(!vals.length) return null;
  return Math.max(...vals);
}
function ehFinal(idade){ return idade>=28; }
function vereditoHTML(mpa, idade, fck){
  if(mpa==null) return '<span class="muted">—</span>';
  let badge='';
  if(ehFinal(idade)){ const ok=mpa>=(fck||0); badge=` <span class="badge ${ok?'b-ok':'b-bad'}">${ok?'conforme':'não conf.'}</span>`; }
  else badge=` <span class="badge b-mut">parcial (${idade}d)</span>`;
  return `<b class="mono">${mpa.toFixed(1)} MPa</b>${badge}`;
}
function idadeAtual(d){ return rompIdade[d.duplaKey]!=null ? rompIdade[d.duplaKey] : d.idade; }
function atualizaPrevia(duplaKey){
  const d = rompGrupos.find(x=>x.duplaKey===duplaKey);
  if(!d) return;
  const el = document.getElementById('res_'+duplaKey.replace(/[|:]/g,'_'));
  if(el) el.innerHTML = vereditoHTML(resultadoDupla(d), idadeAtual(d), d.fck);
  // recalcula a data prevista exibida conforme idade ajustada
  const pe = document.getElementById('prev_'+duplaKey.replace(/[|:]/g,'_'));
  if(pe && d.moldagem){
    const novaPrev = addDiasISO(d.moldagem, idadeAtual(d));
    const atrasada = novaPrev < hojeISO();
    pe.innerHTML = fmtData(novaPrev) + (atrasada?'<br><span class="badge b-bad">atrasada</span>':'');
  }
}
function mudarIdadeDupla(duplaKey, v){ rompIdade[duplaKey]=+v; atualizaPrevia(duplaKey); }

function desenharRomper(){
  const wrap=document.getElementById('wrap');
  const obras=['Todas',...new Set(rompGrupos.map(g=>g.obra))];
  let lista = rompGrupos;
  if(rompFiltroObra!=='Todas') lista = lista.filter(g=>g.obra===rompFiltroObra);
  const IDADES=[3,4,7,28,63];

  let html=`<div class="officehead"><h2>Romper</h2><p>Lance as prensas (tf) de cada corpo de prova. O resultado em MPa e a conformidade são calculados automaticamente.</p></div>
    <div style="display:flex;gap:14px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap">
      <div><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Romper até a data</label>
        <input type="date" value="${rompData}" onchange="rompData=this.value;abaRomper()"></div>
      <div><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Obra</label>
        <select onchange="rompFiltroObra=this.value;desenharRomper()">${obras.map(o=>`<option ${o===rompFiltroObra?'selected':''}>${o}</option>`).join('')}</select></div>
      <div style="margin-left:auto;color:var(--muted);font-size:13px;align-self:center">${lista.length} dupla(s) a romper</div>
    </div>`;

  // ----- TABELA A ROMPER -----
  if(!lista.length){
    html += '<div class="estado" style="padding:30px">Nenhum corpo de prova para romper até esta data. 🎉</div>';
  } else {
    html += `<div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr>
        <th>Obra · Pav</th><th style="width:80px">NF</th><th style="width:110px">Idade</th><th style="width:120px">Prevista</th>
        <th style="width:200px">Prensas (tf)</th><th style="width:150px">Resultado</th><th>Observação</th>
      </tr></thead><tbody>`;
    lista.forEach(d=>{
      const idAtual=idadeAtual(d);
      const prevCalc = d.moldagem ? addDiasISO(d.moldagem, idAtual) : d.prevista;
      const atrasada = prevCalc < hojeISO();
      const prevId='prev_'+d.duplaKey.replace(/[|:]/g,'_');
      const prevTxt = fmtData(prevCalc) + (atrasada?'<br><span class="badge b-bad">atrasada</span>':'');
      const idadeOpts = IDADES.map(x=>`<option value="${x}" ${x==idAtual?'selected':''}>${x} dias</option>`).join('');
      const inputs = d.cps.map(c=>`<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0">
          <span class="mono" style="font-size:12px;color:var(--muted)">CP${c.numero}</span>
          <input style="width:68px;padding:8px" inputmode="decimal" placeholder="tf"
            value="${rompInputs[c.id]||''}"
            oninput="rompInputs[${c.id}]=this.value;atualizaPrevia('${d.duplaKey}')"></span>`).join('');
      const resId = 'res_'+d.duplaKey.replace(/[|:]/g,'_');
      html += `<tr>
        <td>${d.obra}<div style="color:var(--muted);font-size:12px">${d.pav}</div></td>
        <td class="mono">${d.nf}</td>
        <td><select style="width:104px;padding:8px" onchange="mudarIdadeDupla('${d.duplaKey}',this.value)">${idadeOpts}</select></td>
        <td class="mono" id="${prevId}">${prevTxt}</td>
        <td>${inputs}</td>
        <td id="${resId}"><span class="muted">—</span></td>
        <td><input style="width:100%;padding:8px" placeholder="opcional" value="${rompObs[d.duplaKey]||''}" oninput="rompObs['${d.duplaKey}']=this.value"></td>
      </tr>`;
    });
    html += `</tbody></table></div>
      <button class="btn" onclick="confirmarRompimentos()" style="margin-top:16px">Confirmar rompimentos</button>`;
  }

  // ----- TABELA ROMPIDOS NO DIA (por dupla) -----
  html += `<div style="margin-top:34px"><h2 style="font-size:19px;margin:0 0 4px">Rompidos em ${fmtData(rompData)}</h2>
    <p style="color:var(--muted);margin:0 0 16px;font-size:14px">Corpos de prova já rompidos nesta data, agrupados por dupla. Você pode corrigir as prensas e a observação (a idade fica travada).</p>`;
  if(!rompidosDia.length){
    html += '<div class="estado" style="padding:30px">Nenhum rompimento confirmado nesta data ainda.</div>';
  } else {
    html += `<div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr>
        <th>Obra · Pav</th><th style="width:80px">NF</th><th style="width:55px">Idade</th>
        <th style="width:230px">Prensas (tf)</th><th style="width:160px">Resultado</th><th>Observação</th><th style="width:170px"></th>
      </tr></thead><tbody>`;
    rompidosDia.forEach(d=>{
      const emEdicao = !!editRomp[d.duplaId];
      if(emEdicao){
        const e=editRomp[d.duplaId];
        const inputs = d.itens.map(it=>`<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0">
            <span class="mono" style="font-size:12px;color:var(--muted)">CP${it.numero}</span>
            <input style="width:68px;padding:8px" inputmode="decimal" value="${e.p[it.rompId]||''}" oninput="editRomp['${d.duplaId}'].p[${it.rompId}]=this.value"></span>`).join('');
        html += `<tr style="background:#fffdf4">
          <td>${d.obra}<div style="color:var(--muted);font-size:12px">${d.pav}</div></td>
          <td class="mono">${d.nf}</td><td class="mono">${d.idade}d</td>
          <td>${inputs}</td>
          <td class="muted" style="font-size:12px">recalcula ao salvar</td>
          <td><input style="width:100%;padding:8px" value="${e.obs||''}" oninput="editRomp['${d.duplaId}'].obs=this.value"></td>
          <td><button class="btn" style="padding:8px 14px;font-size:13px" onclick="salvarEdicaoDupla('${d.duplaId}')">Salvar</button>
              <button class="btn ghost" style="padding:8px 12px;font-size:13px;margin-left:4px" onclick="cancelarEdicaoDupla('${d.duplaId}')">Cancelar</button></td>
        </tr>`;
      } else {
        const prensasTxt = d.itens.map(it=>`<span class="mono" style="margin-right:10px">CP${it.numero}: ${it.tf!=null?Number(it.tf).toFixed(1):'—'}</span>`).join('');
        html += `<tr>
          <td>${d.obra}<div style="color:var(--muted);font-size:12px">${d.pav}</div></td>
          <td class="mono">${d.nf}</td><td class="mono">${d.idade}d</td>
          <td>${prensasTxt}</td>
          <td>${vereditoHTML(d.resultado, d.idade, d.fck)}</td>
          <td style="font-size:13px">${d.itens[0].obs||'<span class="muted">—</span>'}</td>
          <td><button class="btn ghost" style="padding:8px 16px;font-size:13px" onclick="abrirEdicaoDupla('${d.duplaId}')">Editar</button></td>
        </tr>`;
      }
    });
    html += `</tbody></table></div>`;
  }
  html += `</div>`;

  wrap.innerHTML = html;
  lista.forEach(d=>atualizaPrevia(d.duplaKey));
}

// edição da dupla rompida
function abrirEdicaoDupla(duplaId){
  const d = rompidosDia.find(x=>x.duplaId===duplaId);
  if(!d) return;
  const p={}; d.itens.forEach(it=>{ p[it.rompId]= it.tf!=null? String(it.tf):''; });
  editRomp[duplaId]={ p, obs: d.itens[0].obs||'' };
  desenharRomper();
}
function cancelarEdicaoDupla(duplaId){ delete editRomp[duplaId]; desenharRomper(); }
async function salvarEdicaoDupla(duplaId){
  const d = rompidosDia.find(x=>x.duplaId===duplaId);
  const e = editRomp[duplaId];
  if(!d||!e) return;
  const ups=[];
  for(const it of d.itens){
    const tf=parseFloat(String(e.p[it.rompId]||'').replace(',','.'));
    if(isNaN(tf)||tf<=0){ alert('Informe prensa válida para CP'+it.numero+'.'); return; }
    ups.push({ rompId:it.rompId, tf });
  }
  try{
    const res=await Promise.all(ups.map(u=>sb.from('rompimentos').update({prensa1_tf:u.tf, observacao:e.obs||null}).eq('id',u.rompId)));
    for(const r of res) if(r.error) throw r.error;
    delete editRomp[duplaId];
    await abaRomper();
  }catch(err){ alert('Não consegui salvar a edição: '+(err.message||err)); }
}

async function confirmarRompimentos(){
  // 1 rompimento por CP com prensa preenchida.
  // idade_real = idade ajustada nesta rompida (padrão = programada); data_rompimento = hoje (system date)
  const hoje = hojeISO();
  const linhas=[];
  rompGrupos.forEach(d=>{
    const idade = idadeAtual(d);
    d.cps.forEach(c=>{
      const tf=parseFloat(String(rompInputs[c.id]||'').replace(',','.'));
      if(!isNaN(tf)&&tf>0){
        linhas.push({
          corpo_prova_id:c.id, prensa1_tf:tf, idade_real:idade,
          data_rompimento:hoje, confirmado:true, observacao:rompObs[d.duplaKey]||null
        });
      }
    });
  });
  if(!linhas.length){ alert('Lance ao menos uma prensa.'); return; }
  if(!confirm(linhas.length+' corpo(s) de prova serão rompidos e confirmados nesta data ('+fmtData(hoje)+'). Continuar?')) return;
  try{
    const { error } = await sb.from('rompimentos').insert(linhas);
    if(error) throw error;
    rompData = hoje; // mostra os recém-rompidos na tabela de rompidos de hoje
    await abaRomper();
    document.getElementById('wrap').insertAdjacentHTML('afterbegin',
      `<div class="card" style="text-align:center;border-color:#bcd2bf;background:#f3f9f4"><div style="font-size:34px">✓</div>
       <div style="font-weight:700;color:var(--ok)">${linhas.length} rompimento(s) confirmado(s)!</div></div>`);
  }catch(e){ document.getElementById('wrap').insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui gravar.</b><br>'+(e.message||e)+'</div>'); window.scrollTo(0,0); }
}

(async function(){
  const { data } = await sb.auth.getSession();
  if(data.session){ userEmail=data.session.user.email; iniciar(); }
  else telaLogin('');
})();
</script>
