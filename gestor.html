<style>
:root{
  --paper:#FFFBEE; --card:#FFFEF8; --ink:#0E0E0E; --muted:#7A746A;
  --line:#EAE2C6; --accent:#BD5D27; --accent-ink:#8E4319; --accent-soft:#F7E7D7;
  --ok:#3F945A; --warn:#FAA21B; --bad:#B02A20; --head:#F1EFE7;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Montserrat",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}

.topbar{background:var(--ink);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:14px}

.topbar .ttl{font-weight:700;font-size:17px}
.topbar .co{font-size:12px;color:#cfc9bd}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:13px;color:#cfc9bd}
.topbar .sair{background:none;border:0;color:#fff;font-weight:700;font-size:13px;text-decoration:underline}

.tabs{display:flex;gap:8px;padding:16px 26px 0;border-bottom:1px solid var(--line);background:#fff;flex-wrap:wrap}
.tab{padding:12px 22px;border:0;background:none;font-weight:700;font-size:15px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}

.wrap{max-width:1180px;margin:0 auto;padding:26px}
.officehead h2{font-size:22px;margin:0 0 4px}
.officehead p{color:var(--muted);margin:0 0 20px;font-size:14px}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.ch{font-weight:700;font-size:16px;margin-bottom:12px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--head);text-align:left;padding:10px 11px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#524d44;font-weight:700;border-bottom:1px solid var(--line)}

.empty{text-align:center;color:var(--muted);padding:22px}

.btn{padding:13px 26px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px}
.btn:disabled{opacity:.6}

.estado{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;line-height:1.6}

.chip{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);border:1px solid #e3c3a6;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:700}

.chip.bad{background:#fde8e2;color:#8a3220;border-color:#e0b09f}
.chip.warn{background:#fcf0d8;color:#8a6a12;border-color:#e6cf95}

.filters{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.office-fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;margin-bottom:5px}

.bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 18px;min-width:140px;flex:1}

  border:1.4px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;font-size:11.5px;font-weight:700;color:#1f3d29;min-height:26px}
.pv.pv-empty{background:#fff;border-color:var(--line);color:var(--muted)}

.sevleg{margin-top:12px}
.sevbar{height:10px;border-radius:6px;background:linear-gradient(90deg,rgb(63,148,90),rgb(240,196,70),rgb(226,140,40),rgb(176,42,32))}
.sevlabels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:3px}

.cal{max-width:340px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav button{border:1px solid var(--line);background:#fff;border-radius:8px;width:32px;height:32px;font-weight:700;color:var(--accent-ink);font-size:16px}

.cal-head span{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:2px 0}
.cal-cell{position:relative;text-align:center;padding:8px 0;border-radius:7px;font-size:12.5px;border:1px solid transparent;color:var(--muted)}
.cal-cell.empty{border:0}

.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px}
.login-box{width:100%;max-width:380px}
.login-logo{font-weight:800;border:3px solid var(--ink);border-radius:12px;padding:10px 16px;font-size:22px;text-align:center;width:fit-content;margin:0 auto 10px}
.login-tit{color:var(--accent);font-size:20px;font-weight:700;text-align:center}

.login-box .btn{width:100%}

<script>
const SUPABASE_URL = "https://anzggndtjtwwrbxfguvm.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuemdnbmR0anR3d3JieGZndXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDU2MDcsImV4cCI6MjA5NTgyMTYwN30.Jcx-wvWnMAtKg1epCsTV3RGlW01nw4RSDy4RvYIm78Q";
const sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
const root = document.getElementById('root');
const MPA_PER_TF = 1.2486;

let userEmail='';
let perfisUsuario=[];
const PERFIS_OK=['admin','gestor'];

let OBRAS=[];
let G = { aba:'dash', obra:null, fData:'', fPav:null, dados:null, calRef:null, showCal:false,
  rel:{ de:'', ate:'', traco:'', pav:'', idade:'' } };

function fmtData(iso){ if(!iso) return '—'; const s=String(iso).slice(0,10); const[a,m,d]=s.split('-'); return d&&m&&a?`${d}/${m}/${a}`:s; }
function fmt(n,c){ if(n==null||isNaN(n)) return '—'; return Number(n).toFixed(c==null?1:c); }
function ehFinal(idade){ return idade!=null && idade>=28; }
function andarDe(nomePav){ const i=nomePav.indexOf(' - '); return i>=0 ? nomePav.slice(0,i).trim() : nomePav.trim(); }

// ---- LOGIN ----
function telaLogin(msg){
  root.innerHTML = `
    <div class="login-wrap"><div class="login-box">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Gestor</div>
      <div class="login-sub">Controle Tecnológico de Concreto</div>
      <label>E-mail</label><input id="li_email" type="email" autocapitalize="off" placeholder="seu@email.com">
      <label>Senha</label><input id="li_senha" type="password" placeholder="••••••••">
      ${msg?`<div class="erro">${msg}</div>`:''}
      <button class="btn" id="li_btn" onclick="entrar()">Entrar</button>
    </div></div>`;
}
async function entrar(){
  const email=document.getElementById('li_email').value.trim();
  const senha=document.getElementById('li_senha').value;
  if(!email||!senha){ telaLogin('Preencha e-mail e senha.'); return; }
  const btn=document.getElementById('li_btn'); btn.disabled=true; btn.textContent='Entrando…';
  const { data, error } = await sb.auth.signInWithPassword({email,password:senha});
  if(error){ telaLogin('Não consegui entrar: '+error.message); return; }
  userEmail=data.user.email; iniciar();
}
async function sair(){ await sb.auth.signOut(); userEmail=''; telaLogin(''); }
function telaSemAcesso(msg){
  root.innerHTML = `
    <div class="login-wrap"><div class="login-box" style="text-align:center">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Sem acesso</div>
      <div class="login-sub" style="margin-bottom:14px">O usuário ${userEmail} não tem permissão para o painel do Gestor${perfisUsuario.length?` (perfil: ${perfisUsuario.join(', ')})`:''}.<br>Fale com a administradora.</div>
      ${msg?`<div class="login-sub" style="font-size:12px;color:#b02a20;margin-bottom:14px">detalhe técnico: ${msg}</div>`:''}
      <button class="btn" onclick="sair()">Sair</button>
    </div></div>`;
}

function casca(){
  return `
    <div class="topbar">
      <div class="logo">GT&amp;ABC</div>
      <div><div class="ttl">Gestor</div><div class="co">Controle Tecnológico de Concreto</div></div>
      <div class="right"><span>${userEmail}</span><button class="sair" onclick="sair()">Sair</button></div>
    </div>
    <div class="tabs">
      <button class="tab ${G.aba==='dash'?'on':''}" onclick="irAba('dash')">Dashboard</button>
      <button class="tab ${G.aba==='rel'?'on':''}" onclick="irAba('rel')">Relatórios</button>
    </div>
    <div class="wrap" id="wrap"></div>`;
}
function irAba(a){ G.aba=a; render(); }
function render(){
  const prevElev=document.querySelector('.elevscroll'); const elevTop=prevElev?prevElev.scrollTop:null;
  root.innerHTML = casca();
  if(G.aba==='dash') desenharDash();
  else desenharRelatorios();
  const sel=document.getElementById('selObra');
  if(sel) sel.value = String(G.obra);
  if(elevTop!=null){ const e=document.querySelector('.elevscroll'); if(e) e.scrollTop=elevTop; }
}

async function iniciar(){
  root.innerHTML = '<div class="estado">Carregando…</div>';
  let err='';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ err='Sessão não encontrada. Saia e entre novamente.'; }
    else { const { data, error } = await sb.rpc('meus_perfis'); if(error) err=error.message; else perfisUsuario=Array.isArray(data)?data:[]; }
  }catch(e){ err=(e&&e.message)?e.message:String(e); }
  if(!perfisUsuario.some(p=>PERFIS_OK.includes(p))){ telaSemAcesso(err); return; }
  // obras às quais este gestor está restrito (vazio = todas). Admin sempre vê todas.
  G.obrasRestritas=[];
  try{
    if(!perfisUsuario.includes('admin')){
      const { data } = await sb.rpc('minhas_obras');
      G.obrasRestritas = Array.isArray(data) ? data.map(Number) : [];
    }
  }catch(_){ G.obrasRestritas=[]; }
  try{
    const { data, error } = await sb.from('obras').select('id,nome').order('nome');
    if(error) throw error;
    let lista = data||[];
    if(G.obrasRestritas.length){ lista = lista.filter(o=>G.obrasRestritas.includes(Number(o.id))); }
    OBRAS=lista;
    if(!OBRAS.length){ root.innerHTML=casca(); document.getElementById('wrap').innerHTML='<div class="estado">Nenhuma obra liberada para o seu acesso.</div>'; return; }
    G.obra=OBRAS[0].id;
    await carregarDados();
    render();
  }catch(e){ root.innerHTML=casca(); document.getElementById('wrap').innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}

async function carregarDados(){
  G.dados=null;
  const obraId=G.obra;
  G.obraNome=(OBRAS.find(o=>String(o.id)===String(obraId))||{}).nome||'';
  const { data:pavs, error:e0 } = await sb.from('pavimentos').select('id,nome,ordem').eq('obra_id',obraId).order('ordem');
  if(e0) throw e0;

  // Filtra a OBRA já na consulta (via relação), trazendo só o que é desta obra.
  const romps = await pegarTudo('rompimentos',
    'idade_real,data_rompimento,prensa1_tf,resultado_mpa,confirmado,corpos_prova!inner(numero,betoneiras!inner(nota_fiscal,fck,slump_especificado,tolerancia,traco_descricao,slump_medido,agua_adicionada,volume,observacao,concretagens!inner(obra_id,data_concretagem,elementos(nome),pavimentos!inner(id,nome))))',
    q=>q.eq('corpos_prova.betoneiras.concretagens.obra_id', obraId));
  const cpsPend = await pegarTudo('corpos_prova',
    'numero,idade_prevista,data_prevista,descartado,betoneiras!inner(nota_fiscal,fck,volume,concretagens!inner(obra_id,data_concretagem,elementos(nome),pavimentos!inner(id,nome))),rompimentos(id)',
    q=>q.eq('betoneiras.concretagens.obra_id', obraId));
  const recus = await pegarTudo('betoneiras',
    'nota_fiscal,fck,slump_especificado,tolerancia,traco_descricao,volume,aceita,observacao,concretagens!inner(obra_id,data_concretagem,elementos(nome),pavimentos!inner(id,nome)),motivos_recusa(nome)',
    q=>q.eq('concretagens.obra_id', obraId).eq('aceita', false));

  const R = (romps||[]).filter(r=>r.confirmado && r.corpos_prova&&r.corpos_prova.betoneiras&&r.corpos_prova.betoneiras.concretagens)
    .map(r=>{ const b=r.corpos_prova.betoneiras,c=b.concretagens,p=c.pavimentos;
      const mpa=r.resultado_mpa!=null?Number(r.resultado_mpa):(r.prensa1_tf!=null?r.prensa1_tf*MPA_PER_TF:null);
      return { pavId:p.id, pav:p.nome, elem:(c.elementos&&c.elementos.nome)||'', nf:b.nota_fiscal, fck:b.fck, slump:b.slump_especificado, tol:b.tolerancia, desc:b.traco_descricao,
               slumpMed:b.slump_medido, agua:b.agua_adicionada, vol:Number(b.volume)||0, idade:r.idade_real, data:c.data_concretagem, dataRomp:r.data_rompimento, mpa, obs:b.observacao||'' }; });
  const nfComFinal=new Set(R.filter(r=>ehFinal(r.idade)).map(r=>r.nf));
  const semRomp = cp => !cp.rompimentos || (Array.isArray(cp.rompimentos)?cp.rompimentos.length===0:!cp.rompimentos);
  const P = (cpsPend||[]).filter(cp=>!cp.descartado && semRomp(cp) && cp.betoneiras&&cp.betoneiras.concretagens && cp.idade_prevista!=null && cp.idade_prevista<28)
    .map(cp=>{ const b=cp.betoneiras,c=b.concretagens,p=c.pavimentos;
      return { pavId:p.id, pav:p.nome, elem:(c.elementos&&c.elementos.nome)||'', nf:b.nota_fiscal, fck:b.fck, vol:Number(b.volume)||0, idade:cp.idade_prevista, data:c.data_concretagem, prev:cp.data_prevista }; })
    .filter(x=>!nfComFinal.has(x.nf));
  const X = (recus||[]).filter(b=>!b.aceita && b.concretagens)
    .map(b=>{ const c=b.concretagens,p=c.pavimentos;
      return { pavId:p.id, pav:p.nome, elem:(c.elementos&&c.elementos.nome)||'', nf:b.nota_fiscal, fck:b.fck, slump:b.slump_especificado, tol:b.tolerancia, desc:b.traco_descricao, vol:Number(b.volume)||0, data:c.data_concretagem, motivo:(b.motivos_recusa&&b.motivos_recusa.nome)||'—', obs:b.observacao||'' }; });

  const datas=[...new Set([...R,...P,...X].map(r=>r.data).filter(Boolean))].sort().reverse();
  G.dados={ pavs, R, P, X, datas };
  G.calRef = datas.length ? new Date(datas[0]+'T00:00:00') : new Date();
  if(datas.length){ G.rel.de = datas[datas.length-1]; G.rel.ate = datas[0]; }
  else { G.rel.de=''; G.rel.ate=''; }
  G.rel.traco=''; G.rel.pav=''; G.rel.idade='';
}
async function trocarObra(id){
  G.obra=id; G.fData=''; G.fPav=null;
  const wrap=document.getElementById('wrap'); if(wrap) wrap.innerHTML='<div class="estado">Carregando dados da obra…</div>';
  try{ await carregarDados(); render(); }
  catch(e){ const w=document.getElementById('wrap'); if(w) w.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e.message||e)+'</div>'; }
}
async function pegarTudo(tabela, cols, mod){
  let todos=[], de=0; const passo=1000;
  while(true){
    let q = sb.from(tabela).select(cols);
    if(mod) q = mod(q);
    q = q.range(de, de+passo-1);
    const { data, error } = await q;
    if(error) throw error; todos=todos.concat(data||[]); if(!data||data.length<passo) break; de+=passo;
  }
  return todos;
}

function duplasFinais(romps){
  const map={};
  romps.filter(r=>ehFinal(r.idade)).forEach(r=>{ const k=r.nf+'|'+r.idade;
    if(!map[k]) map[k]={ pavId:r.pavId,pav:r.pav,elem:r.elem,nf:r.nf,fck:r.fck,slump:r.slump,tol:r.tol,desc:r.desc,vol:r.vol,idade:r.idade,data:r.data,dataRomp:r.dataRomp,slumpMed:r.slumpMed,agua:r.agua,obs:r.obs||'',mpas:[] };
    map[k].mpas.push(r.mpa); });
  return Object.values(map).map(d=>{ const melhor=Math.max(...d.mpas.filter(v=>v!=null),-Infinity);
    return { ...d, resultado:isFinite(melhor)?melhor:null, conforme:isFinite(melhor)?melhor>=(d.fck||0):null }; });
}
function taxaColor(taxa){
  const p=Math.max(0,Math.min(taxa,0.30))/0.30;
  const stops=[[63,148,90],[240,196,70],[226,140,40],[176,42,32]];
  const x=p*(stops.length-1); const i=Math.min(Math.floor(x),stops.length-2); const t=x-i;
  const c=k=>Math.round(stops[i][k]+(stops[i+1][k]-stops[i][k])*t);
  return `rgb(${c(0)},${c(1)},${c(2)})`;
}
function labelTraco(d){
  const has=v=>v!==null&&v!==undefined&&String(v).trim()!=='';
  let s=`fck ${has(d.fck)?d.fck:'—'}`;
  if(has(d.slump)) s+=` · ${d.slump}±${has(d.tol)?d.tol:'?'}`;
  if(has(d.desc)) s+=` · ${d.desc}`;
  return s;
}
function dadosFiltrados(){
  const D=G.dados; let R=D.R,P=D.P,X=D.X;
  if(G.fData){ R=R.filter(r=>r.data===G.fData); P=P.filter(p=>p.data===G.fData); X=X.filter(x=>x.data===G.fData); }
  return {R,P,X};
}

// ---- DASHBOARD ----
function desenharDash(){
  const wrap=document.getElementById('wrap'); const D=G.dados;
  const obraNome=G.obraNome||(OBRAS.find(o=>String(o.id)===String(G.obra))||{}).nome||'';
  const {R,P,X}=dadosFiltrados();
  const finais=duplasFinais(R);

  const andares=[]; const andarMap={}; const ordemAndar={}; const pavAndar={};
  D.pavs.forEach(p=>{ const a=andarDe(p.nome); if(!(a in andarMap)){ andarMap[a]={ok:0,nc:0,parc:0,pavIds:[]}; andares.push(a); ordemAndar[a]=p.ordem; } andarMap[a].pavIds.push(p.id); pavAndar[p.id]=a; });
  finais.forEach(d=>{ const a=pavAndar[d.pavId]; if(a&&andarMap[a]){ d.conforme?andarMap[a].ok++:andarMap[a].nc++; } });
  P.forEach(p=>{ const a=pavAndar[p.pavId]; if(a&&andarMap[a]) andarMap[a].parc++; });
  andares.sort((a,b)=>ordemAndar[a]-ordemAndar[b]);

  const blocks=andares.map(a=>{
    const s=andarMap[a]; const tot=s.ok+s.nc; const taxa=tot?s.nc/tot:0;
    const sel=G.fPav===a?'sel':''; let style='',cls='pv-empty',tip=`${a}: sem rompimento`;
    if(tot){ const bg=taxaColor(taxa); const dark=taxa>=0.16; cls=''; style=`style="background:${bg};border-color:${bg};color:${dark?'#fff':'#1f3d29'}"`; tip=`${a}: ${s.nc} de ${tot} não conf (${Math.round(taxa*100)}%)`; }
    else if(s.parc){ cls='pv-parc'; tip=`${a}: ${s.parc} parcial`; }
    return `<button class="pv ${cls} ${sel}" ${style} title="${tip}" onclick="filtrarAndar('${a.replace(/'/g,"\\'")}')">${a}</button>`;
  }).join('');

  let detF=finais,detP=P,detX=X;
  if(G.fPav){ const ids=new Set((andarMap[G.fPav]||{pavIds:[]}).pavIds);
    detF=finais.filter(d=>ids.has(d.pavId)); detP=P.filter(p=>ids.has(p.pavId)); detX=X.filter(x=>ids.has(x.pavId)); }

  const kF=G.fPav?detF:finais;
  const conf=kF.filter(d=>d.conforme===true).length, nc=kF.filter(d=>d.conforme===false).length;
  const pct=kF.length?Math.round(conf/kF.length*100):0;
  const kpi4=G.fPav
    ? `<div class="kpi"><div class="v" style="font-size:14px;line-height:1.5">${[...new Set(detF.concat(detP).map(x=>fmtData(x.data)))].filter(Boolean).join('<br>')||'—'}</div><div class="k">Data da concretagem</div></div>`
    : `<div class="kpi"><div class="v">${P.length}</div><div class="k">Parciais pendentes</div></div>`;

  const rowF=d=>`<tr><td>${d.pav}</td><td style="font-size:12px">${d.elem||'—'}</td><td class="mono">${d.nf}</td><td class="mono">${fmt(d.vol)}</td><td>${labelTraco(d)}</td><td class="mono">${d.idade}d</td><td class="mono">${fmt(d.resultado)} MPa</td><td>${d.conforme?'<span class="chip ok">conforme</span>':'<span class="chip bad">não conf.</span>'}</td><td style="font-size:12px">${d.obs||'—'}</td></tr>`;
  const rowP=c=>`<tr><td>${c.pav}</td><td style="font-size:12px">${c.elem||'—'}</td><td class="mono">${c.nf}</td><td class="mono">${fmt(c.vol)}</td><td class="mono">fck ${c.fck||'—'}</td><td class="mono">${c.idade}d</td><td class="mono">${fmtData(c.prev)}</td><td><span class="chip warn">aguardando final</span></td></tr>`;
  const rowX=x=>`<tr><td>${x.pav}</td><td style="font-size:12px">${x.elem||'—'}</td><td class="mono">${x.nf}</td><td class="mono">${fmt(x.vol)}</td><td>${labelTraco(x)}</td><td class="mono">${fmtData(x.data)}</td><td>${x.motivo}</td><td style="font-size:12px">${x.obs||'—'}</td></tr>`;
  const volF=(arr,cols)=>{ const m={}; arr.forEach(r=>{ if(!(r.nf in m)) m[r.nf]=r.vol||0; }); const tot=Object.values(m).reduce((s,v)=>s+v,0); const nfs=Object.keys(m).length; return `<tr class="sumrow"><td colspan="${cols}">Volume total <b>${fmt(tot)} m³</b> · ${nfs} NF · ${arr.length} registro(s)</td></tr>`; };

  const obrasOpts=OBRAS.map(o=>`<option value="${o.id}" ${String(o.id)===String(G.obra)?'selected':''}>${o.nome}</option>`).join('');

  wrap.innerHTML=`
    <div class="officehead"><h2>Dashboard de resultados</h2><p>Elevação da torre — cada bloco é um andar, colorido pela conformidade. Clique para ver o detalhe.</p></div>
    <div class="filters">
      <div class="office-fld"><label>Obra</label>${OBRAS.length>1?`<select id="selObra" style="width:230px" onchange="trocarObra(this.value)">${obrasOpts}</select>`:`<div style="font-weight:700;padding:10px 2px">${obraNome}</div>`}</div>
      <button class="btn ghost sm" onclick="G.showCal=!G.showCal;render()">${G.showCal?'ocultar calendário':'data da concretagem'}</button>
      ${G.fData?`<button class="btn ghost sm" onclick="G.fData='';render()">✕ ${fmtData(G.fData)}</button>`:''}
      ${G.fPav?`<button class="btn ghost sm" onclick="G.fPav=null;render()">✕ ${G.fPav}</button>`:''}
    </div>
    ${G.showCal?calendarioHTML():''}
    <div class="bar">
      <div class="kpi"><div class="v">${pct}%</div><div class="k">Conformidade (final)</div></div>
      <div class="kpi ${nc?'alert':''}"><div class="v">${nc}</div><div class="k">Não conformes</div></div>
      <div class="kpi"><div class="v">${conf}</div><div class="k">Conformes</div></div>
      ${kpi4}
    </div>
    <div class="split">
      <div class="card elevcard">
        <div style="font-weight:700;margin-bottom:2px">Elevação</div>
        <div class="muted" style="font-size:12px;margin-bottom:8px">${obraNome} · ${andares.length} andares</div>
        <div class="elevscroll"><div class="elev">${blocks}</div></div>
        <div class="sevleg"><div class="sevbar"></div><div class="sevlabels"><span>0%</span><span>10%</span><span>20%</span><span>30%+</span></div>
          <div class="sevcap">% de resultados não conformes no andar</div>
          <div class="sevcap"><i style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#fcf0d8;border:1px solid #e6cf95;vertical-align:-1px;margin-right:5px"></i>só parcial · <i style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#fff;border:1px solid var(--line);vertical-align:-1px;margin:0 5px"></i>sem dado</div>
        </div>
      </div>
      <div>
        <div class="card"><div class="ch">Rompimentos finalizados <span class="chip info">28 / 63 d</span>${G.fPav?` · ${G.fPav}`:''}</div>
          <table><thead><tr><th>Pavimento</th><th>Elemento</th><th>NF</th><th>Vol <span class="lc">(m³)</span></th><th>Traço</th><th>Idade</th><th>Resultado</th><th>Conf.</th><th>Observação</th></tr></thead>
          <tbody>${detF.length?detF.map(rowF).join('')+volF(detF,9):'<tr><td colspan="9" class="empty">Sem finais para o filtro.</td></tr>'}</tbody></table></div>
        <div class="card"><div class="ch">Parciais pendentes <span class="chip mut">3 / 4 / 7 d</span>${G.fPav?` · ${G.fPav}`:''}</div>
          <table><thead><tr><th>Pavimento</th><th>Elemento</th><th>NF</th><th>Vol <span class="lc">(m³)</span></th><th>Traço</th><th>Idade</th><th>Previsto</th><th>Status</th></tr></thead>
          <tbody>${detP.length?detP.map(rowP).join('')+volF(detP,8):'<tr><td colspan="8" class="empty">Sem parciais pendentes.</td></tr>'}</tbody></table></div>
        <div class="card"><div class="ch">Betoneiras recusadas <span class="chip bad">${detX.length}</span>${G.fPav?` · ${G.fPav}`:''}</div>
          <table><thead><tr><th>Pavimento</th><th>Elemento</th><th>NF</th><th>Vol <span class="lc">(m³)</span></th><th>Traço</th><th>Data</th><th>Motivo</th><th>Observação</th></tr></thead>
          <tbody>${detX.length?detX.map(rowX).join('')+volF(detX,8):'<tr><td colspan="8" class="empty">Nenhuma recusa.</td></tr>'}</tbody></table></div>
      </div>
    </div>`;
}
function filtrarAndar(a){ G.fPav=(G.fPav===a)?null:a; render(); }

// ---- CALENDÁRIO ----
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function calendarioHTML(){
  const ref = G.calRef || new Date();
  const ano=ref.getFullYear(), mes=ref.getMonth();
  const diasConc=new Set(G.dados.datas);
  const primeiroDia=new Date(ano,mes,1).getDay();
  const totalDias=new Date(ano,mes+1,0).getDate();
  const cells=[];
  for(let i=0;i<primeiroDia;i++) cells.push('');
  for(let d=1;d<=totalDias;d++) cells.push(d);
  const body=cells.map(d=>{
    if(d==='') return '<div class="cal-cell empty"></div>';
    const iso=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=diasConc.has(iso); const sel=G.fData===iso?'sel':'';
    if(has) return `<div class="cal-cell has ${sel}" title="Concretagem em ${fmtData(iso)}" onclick="selData('${iso}')">${d}<i class="cal-dot"></i></div>`;
    return `<div class="cal-cell">${d}</div>`;
  }).join('');
  return `<div class="card cal">
    <div class="cal-nav"><button onclick="mudarMes(-1)">‹</button>
      <div style="font-weight:700">${MESES[mes]} / ${ano}</div>
      <button onclick="mudarMes(1)">›</button></div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">Dias com concretagem ficam <b>destacados</b>. Clique para filtrar${G.fData?` · filtrando ${fmtData(G.fData)}`:''}.</div>
    <div class="cal-head">${['D','S','T','Q','Q','S','S'].map(x=>`<span>${x}</span>`).join('')}</div>
    <div class="cal-grid">${body}</div>
  </div>`;
}
function mudarMes(delta){ const r=G.calRef||new Date(); G.calRef=new Date(r.getFullYear(), r.getMonth()+delta, 1); render(); }
function selData(iso){ G.fData = (G.fData===iso)?'':iso; render(); }

// ---- RELATÓRIOS (uma aba, dois cards de filtros, sem tabela) ----
function desenharRelatorios(){
  const wrap=document.getElementById('wrap'); const D=G.dados;
  const obraNome=G.obraNome||(OBRAS.find(o=>String(o.id)===String(G.obra))||{}).nome||'';
  const obrasOpts=OBRAS.map(o=>`<option value="${o.id}" ${String(o.id)===String(G.obra)?'selected':''}>${o.nome}</option>`).join('');
  // opções de traço, pavimento e idade a partir dos dados da obra
  const tracos=[...new Set(D.R.concat(D.X).map(r=>labelTraco(r)))].sort();
  const pavs=[...new Set(D.pavs.map(p=>p.nome))];
  const idades=[...new Set(D.R.filter(r=>ehFinal(r.idade)).map(r=>r.idade))].sort((a,b)=>a-b);
  const opt=(arr,sel,fmtfn)=>['<option value="">Todos</option>'].concat(arr.map(v=>`<option value="${v}" ${String(v)===String(sel)?'selected':''}>${fmtfn?fmtfn(v):v}</option>`)).join('');

  const filtros = `
    <div class="filters" style="margin-bottom:14px">
      <div class="office-fld"><label>Obra</label>${OBRAS.length>1?`<select id="selObra" style="width:210px" onchange="trocarObra(this.value)">${obrasOpts}</select>`:`<div style="font-weight:700;padding:10px 2px">${obraNome}</div>`}</div>
      <div class="office-fld"><label>Período — de (concretagem)</label><input type="date" value="${G.rel.de}" onchange="G.rel.de=this.value;render()"></div>
      <div class="office-fld"><label>Até (concretagem)</label><input type="date" value="${G.rel.ate}" onchange="G.rel.ate=this.value;render()"></div>
      <div class="office-fld"><label>Traço</label><select style="width:200px" onchange="G.rel.traco=this.value;render()">${opt(tracos,G.rel.traco)}</select></div>
      <div class="office-fld"><label>Pavimento</label><select style="width:180px" onchange="G.rel.pav=this.value;render()">${opt(pavs,G.rel.pav)}</select></div>
      <div class="office-fld"><label>Idade</label><select style="width:120px" onchange="G.rel.idade=this.value;render()">${opt(idades,G.rel.idade,v=>v+' dias')}</select></div>
    </div>`;

  const nRes=relResultados().length, nQua=relQuantidades().length;

  wrap.innerHTML=`
    <div class="officehead"><h2>Relatórios</h2><p>Escolha os filtros e exporte. O período se refere à <b>data da concretagem</b>.</p></div>
    ${filtros}
    <div class="card">
      <div class="ch">Relatório de resultados <span class="chip">${nRes} linha(s)</span></div>
      <div class="muted" style="font-size:13px;margin-bottom:12px">Acompanhamento: slump, água, rompimentos e conformidade.</div>
      <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:6px">Colunas</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${['Pavimento','Data','NF','Traço','Slump','Água (L)','Resultado (MPa)','Conformidade'].map(c=>`<span class="chip mut">${c}</span>`).join('')}</div>
      <div style="display:flex;gap:10px"><button class="btn sm" onclick="exportarRelPDF('result')">Gerar PDF</button><button class="btn ghost sm" onclick="exportarRelExcel('result')">Gerar Excel</button></div>
    </div>
    <div class="card">
      <div class="ch">Relatório de quantidades <span class="chip">${nQua} linha(s)</span></div>
      <div class="muted" style="font-size:13px;margin-bottom:12px">Recebimento: volume e aceite/recusa por nota fiscal.</div>
      <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:6px">Colunas</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${['Pavimento','Data','NF','Traço','Volume (m³)','Aceite/Recusa'].map(c=>`<span class="chip mut">${c}</span>`).join('')}</div>
      <div style="display:flex;gap:10px"><button class="btn sm" onclick="exportarRelPDF('quant')">Gerar PDF</button><button class="btn ghost sm" onclick="exportarRelExcel('quant')">Gerar Excel</button></div>
    </div>`;
}
// aplica filtros do relatório (período por data de concretagem, traço, pav, idade)
function passaFiltroRel(r, comIdade){
  if(G.rel.de && r.data < G.rel.de) return false;
  if(G.rel.ate && r.data > G.rel.ate) return false;
  if(G.rel.traco && labelTraco(r)!==G.rel.traco) return false;
  if(G.rel.pav && r.pav!==G.rel.pav) return false;
  if(comIdade && G.rel.idade && String(r.idade)!==String(G.rel.idade)) return false;
  return true;
}
function relResultados(){
  return duplasFinais(G.dados.R).filter(d=>passaFiltroRel(d,true))
    .sort((a,b)=> a.data<b.data?1:a.data>b.data?-1:String(a.nf).localeCompare(String(b.nf),undefined,{numeric:true}));
}
function relQuantidades(){
  // betoneiras aceitas (por NF, via rompimentos) + recusadas
  const map={};
  G.dados.R.filter(r=>passaFiltroRel(r,false)).forEach(r=>{ if(!map[r.nf]) map[r.nf]={pav:r.pav,elem:r.elem,data:r.data,nf:r.nf,traco:labelTraco(r),vol:r.vol,aceite:'Aceita',motivo:'',obs:r.obs||''}; });
  const aceitas=Object.values(map);
  const recus=G.dados.X.filter(x=>passaFiltroRel(x,false)).map(x=>({pav:x.pav,elem:x.elem,data:x.data,nf:x.nf,traco:labelTraco(x),vol:x.vol,aceite:'Recusada',motivo:x.motivo,obs:x.obs||''}));
  return aceitas.concat(recus).sort((a,b)=> a.data<b.data?1:a.data>b.data?-1:String(a.nf).localeCompare(String(b.nf),undefined,{numeric:true}));
}

// ---- PDFs ----
function pdfHeader(doc,titulo){
  const pageW=doc.internal.pageSize.getWidth(); const accent=[189,93,39], muted=[122,116,106];
  const obraNome=G.obraNome||(OBRAS.find(o=>String(o.id)===String(G.obra))||{}).nome||'';
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(14,14,14);
  doc.text('GT&ABC · Controle Tecnológico de Concreto', 12, 14);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(accent[0],accent[1],accent[2]);
  doc.text(obraNome ? (titulo+' — '+obraNome) : titulo, 12, 20);
  doc.setFontSize(8); doc.setTextColor(muted[0],muted[1],muted[2]);
  doc.text('Gerado em '+fmtData(new Date().toISOString())+(G.fData?'  ·  concretagem '+fmtData(G.fData):''), pageW-12, 14, {align:'right'});
}
function exportarDashPDF(){
  if(!window.jspdf||!window.jspdf.jsPDF){ alert('PDF não carregou. Recarregue a página.'); return; }
  const {R,X}=dadosFiltrados(); const finais=duplasFinais(R);
  const conf=finais.filter(d=>d.conforme===true).length,nc=finais.filter(d=>d.conforme===false).length;
  const pct=finais.length?Math.round(conf/finais.length*100):0;
  const { jsPDF }=window.jspdf; const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const accent=[189,93,39]; pdfHeader(doc,'Relatório de Conformidade');
  doc.setTextColor(14,14,14); doc.setFontSize(9);
  doc.text(`Conformidade ${pct}%  ·  ${conf} conforme  ·  ${nc} não conforme`, 12, 27);
  doc.autoTable({ head:[['Pavimento','Elemento','NF','Vol (m³)','Traço','Idade','Resultado (MPa)','Conformidade']],
    body:finais.map(d=>[d.pav,d.elem||'—',String(d.nf),fmt(d.vol),labelTraco(d),d.idade+'d',fmt(d.resultado),d.conforme?'Conforme':'Não conforme']),
    startY:31, theme:'grid', styles:{font:'helvetica',fontSize:8,cellPadding:1.5,lineColor:[234,226,198],lineWidth:0.1},
    headStyles:{fillColor:accent,textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    didParseCell:dt=>{ if(dt.section==='body'&&dt.column.index===7&&dt.cell.raw==='Não conforme'){dt.cell.styles.textColor=[176,42,32];dt.cell.styles.fontStyle='bold';} },
    margin:{left:12,right:12} });
  if(X.length){ doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(accent[0],accent[1],accent[2]);
    doc.text('Betoneiras recusadas',12,doc.lastAutoTable.finalY+7);
    doc.autoTable({ head:[['Pavimento','Elemento','NF','Vol (m³)','fck','Data','Motivo']],
      body:X.map(x=>[x.pav,x.elem||'—',String(x.nf),fmt(x.vol),String(x.fck||'—'),fmtData(x.data),x.motivo]),
      startY:doc.lastAutoTable.finalY+10, theme:'grid', styles:{font:'helvetica',fontSize:8,cellPadding:1.5,lineColor:[234,226,198],lineWidth:0.1},
      headStyles:{fillColor:accent,textColor:[255,255,255],fontStyle:'bold',fontSize:8}, margin:{left:12,right:12} }); }
  doc.save('conformidade_'+new Date().toISOString().slice(0,10)+'.pdf');
}
function exportarRelPDF(tipo){
  if(!window.jspdf||!window.jspdf.jsPDF){ alert('PDF não carregou. Recarregue a página.'); return; }
  const { jsPDF }=window.jspdf; const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const accent=[189,93,39];
  if(tipo==='quant'){
    pdfHeader(doc,'Relatório de Quantidades');
    const todas=relQuantidades();
    const aceitas=todas.filter(r=>r.aceite==='Aceita');
    const recusadas=todas.filter(r=>r.aceite==='Recusada');
    const head=['Pavimento','Elemento','Data','NF','Traço','Volume (m³)'];
    const bloco=(titulo, arr, startY, extraCols)=>{
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(accent[0],accent[1],accent[2]);
      doc.text(titulo+'  ('+arr.length+')', 12, startY);
      const head = ['Pavimento','Elemento','Data','NF','Traço','Volume (m³)'].concat(extraCols||[]);
      doc.autoTable({ head:[head], body:arr.map(r=>{
          const base=[r.pav,r.elem||'—',fmtData(r.data),String(r.nf),r.traco,fmt(r.vol)];
          if(extraCols&&extraCols.includes('Motivo')) base.push(r.motivo||'—');
          if(extraCols&&extraCols.includes('Observação')) base.push(r.obs||'—');
          return base;
        }),
        startY:startY+3, theme:'grid', styles:{font:'helvetica',fontSize:8,cellPadding:1.5,lineColor:[234,226,198],lineWidth:0.1},
        headStyles:{fillColor:accent,textColor:[255,255,255],fontStyle:'bold',fontSize:8},
        columnStyles:{5:{halign:'right'}}, margin:{left:12,right:12} });
      // somatório por traço
      const porTraco=somaPorTraco(arr);
      doc.autoTable({ body:porTraco.map(t=>[{content:'Total — '+t.traco,styles:{fontStyle:'bold'}},{content:fmt(t.vol)+' m³',styles:{halign:'right',fontStyle:'bold'}}])
          .concat([[{content:'TOTAL GERAL',styles:{fontStyle:'bold'}},{content:fmt(arr.reduce((s,r)=>s+r.vol,0))+' m³',styles:{halign:'right',fontStyle:'bold'}}]]),
        startY:doc.lastAutoTable.finalY+1, theme:'plain',
        styles:{font:'helvetica',fontSize:8.5,cellPadding:1.3,textColor:[14,14,14]},
        columnStyles:{0:{cellWidth:200}}, margin:{left:12,right:12} });
      return doc.lastAutoTable.finalY;
    };
    let y=bloco('Betoneiras aceitas', aceitas, 27, ['Observação']);
    bloco('Betoneiras recusadas', recusadas, y+9, ['Motivo','Observação']);
    doc.save('quantidades_'+new Date().toISOString().slice(0,10)+'.pdf');
    return;
  }
  pdfHeader(doc,'Relatório de Resultados');
  const rows=relResultados();
  const head=['Pavimento','Elemento','Data','NF','Traço','Slump','Água (L)','Resultado (MPa)','Conformidade'];
  doc.autoTable({ head:[head], body:rows.map(d=>[d.pav,d.elem||'—',fmtData(d.data),String(d.nf),labelTraco(d),fmt(d.slumpMed),fmt(d.agua),fmt(d.resultado),d.conforme?'Conforme':'Não conforme']),
    startY:27, theme:'grid', styles:{font:'helvetica',fontSize:8,cellPadding:1.5,lineColor:[234,226,198],lineWidth:0.1},
    headStyles:{fillColor:accent,textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    didParseCell:dt=>{ if(dt.section==='body'&&dt.column.index===8&&dt.cell.raw==='Não conforme'){dt.cell.styles.textColor=[176,42,32];dt.cell.styles.fontStyle='bold';} },
    margin:{left:12,right:12} });
  doc.save('resultados_'+new Date().toISOString().slice(0,10)+'.pdf');
}
// soma de volume por traço completo
function somaPorTraco(arr){
  const map={};
  arr.forEach(r=>{ if(!map[r.traco]) map[r.traco]={traco:r.traco,vol:0}; map[r.traco].vol+=(r.vol||0); });
  return Object.values(map).sort((a,b)=>a.traco.localeCompare(b.traco));
}
function exportarRelExcel(tipo){
  if(!window.XLSX){ alert('Planilha não carregou. Recarregue a página.'); return; }
  const obraNome=G.obraNome||(OBRAS.find(o=>String(o.id)===String(G.obra))||{}).nome||'';
  const wb=XLSX.utils.book_new();
  // escreve um título "Relatório — Obra" no topo da aba e os dados abaixo
  const comTitulo=(ws, titulo, ncols)=>{
    XLSX.utils.sheet_add_aoa(ws, [[titulo+' — '+obraNome]], {origin:'A1'});
    return ws;
  };
  if(tipo==='quant'){
    const todas=relQuantidades();
    const aceitas=todas.filter(r=>r.aceite==='Aceita');
    const recusadas=todas.filter(r=>r.aceite==='Recusada');
    const monta=(arr,titulo)=>{
      const ehRec=titulo.indexOf('Recusadas')>=0;
      const linhas=arr.map(r=> ehRec
        ? {Pavimento:r.pav,Elemento:r.elem||'',Data:fmtData(r.data),NF:r.nf,Traço:r.traco,'Volume (m³)':r.vol,Motivo:r.motivo||'',Observação:r.obs||''}
        : {Pavimento:r.pav,Elemento:r.elem||'',Data:fmtData(r.data),NF:r.nf,Traço:r.traco,'Volume (m³)':r.vol,Observação:r.obs||''});
      linhas.push({});
      somaPorTraco(arr).forEach(t=>linhas.push({Pavimento:'TOTAL',Traço:t.traco,'Volume (m³)':Number(t.vol.toFixed(1))}));
      linhas.push({Pavimento:'TOTAL GERAL','Volume (m³)':Number(arr.reduce((s,r)=>s+r.vol,0).toFixed(1))});
      const ws=XLSX.utils.json_to_sheet(linhas, {origin:'A3'});
      XLSX.utils.sheet_add_aoa(ws, [[titulo+' — '+obraNome]], {origin:'A1'});
      return ws;
    };
    XLSX.utils.book_append_sheet(wb, monta(aceitas,'Quantidades · Aceitas'), 'Aceitas');
    XLSX.utils.book_append_sheet(wb, monta(recusadas,'Quantidades · Recusadas'), 'Recusadas');
    XLSX.writeFile(wb,'quantidades_'+new Date().toISOString().slice(0,10)+'.xlsx');
    return;
  }
  const rows=relResultados().map(d=>({Pavimento:d.pav,Elemento:d.elem||'',Data:fmtData(d.data),NF:d.nf,Traço:labelTraco(d),'Slump':d.slumpMed,'Água (L)':d.agua,'Resultado (MPa)':d.resultado,Conformidade:d.conforme?'Conforme':'Não conforme'}));
  const ws=XLSX.utils.json_to_sheet(rows, {origin:'A3'});
  XLSX.utils.sheet_add_aoa(ws, [['Relatório de Resultados — '+obraNome]], {origin:'A1'});
  XLSX.utils.book_append_sheet(wb, ws, 'Resultados');
  XLSX.writeFile(wb,'resultados_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
