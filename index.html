<style>
:root{
  --paper:#FFFBEE; --card:#FFFEF8; --ink:#0E0E0E; --muted:#7A746A;
  --line:#EAE2C6; --accent:#BD5D27; --accent-ink:#8E4319; --accent-soft:#F7E7D7;
  --ok:#3F945A; --warn:#FAA21B; --bad:#B02A20;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Montserrat",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}

.screen{min-height:100vh;display:flex;flex-direction:column;background:var(--paper)}
.appbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 16px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;
  padding-top:calc(14px + env(safe-area-inset-top))}
.appbar .logo{font-weight:800;border:2px solid var(--ink);border-radius:7px;padding:3px 8px;font-size:12px;letter-spacing:.4px}
.appbar .ttl{font-weight:700;font-size:16px;line-height:1.1}
.appbar .co{font-size:10.5px;color:var(--muted);font-weight:600}
.appbar .back{color:var(--accent);font-size:26px;line-height:1;font-weight:700;background:none;border:0;padding:0 4px 0 0}
.appbar .net{margin-left:auto;font-size:11px;display:flex;align-items:center;gap:6px;color:var(--muted)}
.appbar .sair{background:none;border:0;color:var(--accent);font-size:12px;font-weight:700}
.netdot{width:9px;height:9px;border-radius:50%;background:var(--ok)}
.netdot.off{background:var(--warn)}

.pbody{padding:18px;overflow-y:auto;flex:1;max-width:560px;margin:0 auto;width:100%;animation:telaIn .22s ease}
@keyframes telaIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.pbody{animation:none}}
.pfoot{padding:14px 16px;border-top:1px solid var(--line);background:#fff;
  display:flex;flex-direction:column;gap:10px;max-width:560px;margin:0 auto;width:100%;
  padding-bottom:calc(14px + env(safe-area-inset-bottom))}

label.fld{display:block;font-size:13.5px;font-weight:700;color:#2a2a27;margin:0 0 6px}
.row{margin-bottom:15px}
input,select{width:100%;font-size:17px;font-weight:500;padding:14px;border:1.5px solid var(--line);
  border-radius:12px;background:#fff;color:var(--ink);min-height:54px}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23BD5D27' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
.three{display:flex;gap:10px}.three .row{flex:1}

.homebtn{width:100%;display:flex;align-items:center;gap:14px;text-align:left;background:#fff;
  border:1.5px solid var(--line);border-radius:14px;padding:18px;margin-bottom:13px}
.homebtn.primary{background:var(--accent);border-color:var(--accent)}
.homebtn.primary b,.homebtn.primary small{color:#fff}
.homebtn .hi{width:46px;height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:center;
  background:var(--accent-soft);color:var(--accent-ink);border-radius:11px;font-size:24px;font-weight:700}
.homebtn.primary .hi{background:rgba(255,255,255,.2);color:#fff}
.homebtn b{font-size:16px;display:block}
.homebtn small{font-size:13px;color:var(--muted);display:block;margin-top:2px}

.bigbtn{width:100%;padding:17px;border-radius:13px;border:0;background:var(--accent);color:#fff;
  font-weight:700;font-size:17px;min-height:58px}
.bigbtn:disabled{opacity:.6}
.bigbtn.ghost{background:#fff;color:var(--accent-ink);border:2px solid var(--accent);font-size:15px;padding:13px;min-height:auto}

.tcard{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:10px;position:relative}
.tcard .x{position:absolute;top:8px;right:12px;color:var(--bad);background:none;border:0;font-size:20px;line-height:1}
.ar{flex:1;padding:16px;border-radius:12px;border:2px solid var(--line);background:#fff;font-weight:700;font-size:15px;color:var(--muted)}
.ar.on-a{border-color:var(--ok);background:#eaf3ec;color:var(--ok)}
.ar.on-r{border-color:var(--bad);background:#fde8e2;color:var(--bad)}
.chipbtn{min-width:54px;padding:12px 16px;border-radius:11px;border:2px solid var(--line);background:#fff;font-weight:700;font-size:15px;color:var(--ink)}
.chipbtn.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.cpnums{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:6px}
.cpnum{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:18px;background:var(--accent-soft);
  color:var(--accent-ink);border:1.5px solid #e3c3a6;border-radius:10px;padding:10px 14px;min-width:48px;text-align:center}
.hello{font-weight:700;font-size:20px;margin:6px 0 4px}
.sub{font-size:13px;color:var(--muted)}
.fldlabel{font-size:13.5px;font-weight:700;color:#2a2a27;margin:18px 0 8px}
.estado{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.5}
.erro{background:#fde8e2;border:1px solid #e0b09f;color:#8a3220;border-radius:10px;padding:14px;font-size:13px;line-height:1.5;margin:10px 0}

/* login */
.login-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px;max-width:420px;margin:0 auto;width:100%}
.login-logo{font-weight:800;border:3px solid var(--ink);border-radius:12px;padding:10px 16px;font-size:22px;letter-spacing:.5px;margin-bottom:8px}
.login-tit{color:var(--accent);font-size:20px;font-weight:700;text-align:center;margin:4px 0 2px}
.login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:26px}
.login-card{width:100%}
</style>
</head>

<script>
const SUPABASE_URL = "https://anzggndtjtwwrbxfguvm.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuemdnbmR0anR3d3JieGZndXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDU2MDcsImV4cCI6MjA5NTgyMTYwN30.Jcx-wvWnMAtKg1epCsTV3RGlW01nw4RSDy4RvYIm78Q";

const sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
const screen = document.getElementById('screen');

const cache = { obras:[], elementos:[], concreteiras:[], motivos:[], pavsPorObra:{} };
const draft = { obraId:null, obraNome:null, pavId:null, pavNome:null, elementoId:null, concreteiraId:null, tracos:[], betoneiras:[], cur:null, concId:null, totalCP:0 };
let tela = 'home';
let userEmail = '';
let perfisUsuario = [];
let nomeUsuario = '';
const PERFIS_OK = ['admin','concretagem']; // quem pode usar o app de concretagem

function horaAgora(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtData(iso){ if(!iso) return '—'; const s=String(iso).slice(0,10); const[a,m,d]=s.split('-'); return d&&m&&a?`${d}/${m}/${a}`:s; }
// slump com vírgula automática: "165" -> "16,5" (último dígito é decimal)
function mascararSlump(el){
  let v = el.value.replace(/[^0-9]/g,'').slice(0,3);
  if(v.length>=2){ el.value = v.slice(0,v.length-1)+','+v.slice(v.length-1); }
  else { el.value = v; }
  if(draft && draft.cur) draft.cur.slump = el.value;
}
// hora 24h com ":" automático (não precisa digitar o separador); padrão = hora do sistema
function mascararHora(el){
  let v = el.value.replace(/[^0-9]/g,'').slice(0,4);
  if(v.length>=3){
    let hh=v.slice(0,2), mm=v.slice(2);
    if(+hh>23) hh='23';
    if(mm.length===2 && +mm>59) mm='59';
    el.value = hh+':'+mm;
  } else { el.value = v; }
  if(draft && draft.cur) draft.cur.hora = el.value;
}
let assinaturaCtx = null; // { concId, titulo, origem }
let detalheOrigem = 'concluidas';
let detalheAtual = null;
function novaBetoneira(){ return { tracoIdx:0, nf:'', lacre:'', hora:horaAgora(), slump:'', agua:'0', volume:'', aceita:true, cpQtd:4, cpModo:'preset', motivoId:null, obs:'' }; }

// ---------- LOGIN ----------
function telaLogin(msg){
  screen.innerHTML = `
    <div class="login-wrap">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Controle de Concreto</div>
      <div class="login-sub">Entre com seu e-mail e senha</div>
      <div class="login-card">
        <div class="row"><label class="fld">E-mail</label>
          <input id="li_email" type="email" inputmode="email" autocapitalize="off" placeholder="seu@email.com"></div>
        <div class="row"><label class="fld">Senha</label>
          <input id="li_senha" type="password" placeholder="••••••••"></div>
        ${msg?`<div class="erro">${msg}</div>`:''}
        <button class="bigbtn" id="li_btn" onclick="entrar()">Entrar</button>
      </div>
    </div>`;
}
async function entrar(){
  const email = document.getElementById('li_email').value.trim();
  const senha = document.getElementById('li_senha').value;
  const btn = document.getElementById('li_btn');
  if(!email || !senha){ telaLogin('Preencha e-mail e senha.'); return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if(error){ telaLogin('Não consegui entrar: ' + error.message); return; }
  userEmail = data.user.email;
  iniciarApp();
}
async function sair(){
  await sb.auth.signOut();
  userEmail = '';
  telaLogin('');
}

// ---------- CASCA (appbar) ----------
function casca(titulo, opts={}){
  return `
    <div class="appbar">
      ${opts.back?`<button class="back" onclick="voltar()">‹</button>`:''}
      <div class="logo">GT&amp;ABC</div>
      <div>
        <div class="ttl">${titulo}</div>
        <div class="co">${userEmail||'Controle Tecnológico de Concreto'}</div>
      </div>
      <button class="sair" onclick="sair()">Sair</button>
    </div>
    <div class="pbody" id="body"></div>
    <div class="pfoot" id="foot" style="display:none"></div>`;
}
function erro(e){
  const b=document.getElementById('body');
  if(b) b.innerHTML='<div class="erro"><b>Não consegui carregar.</b><br>'+(e&&e.message?e.message:e)+'</div>';
}

// ---------- API de leitura (via supabase-js) ----------
async function carregarCadastros(){
  const q = (t,extra)=>sb.from(t).select('*');
  const [obras, elementos, concreteiras, motivos, fck, slump, tol, desc] = await Promise.all([
    sb.from('obras').select('*').eq('ativa',true).order('nome'),
    sb.from('elementos').select('*').eq('ativo',true).order('ordem'),
    sb.from('concreteiras').select('*').eq('ativa',true).order('nome'),
    sb.from('motivos_recusa').select('*').eq('ativo',true).order('ordem'),
    sb.from('opcoes_fck').select('*').eq('ativo',true).order('ordem'),
    sb.from('opcoes_slump').select('*').eq('ativo',true).order('ordem'),
    sb.from('opcoes_tolerancia').select('*').eq('ativo',true).order('ordem'),
    sb.from('opcoes_descricao').select('*').eq('ativo',true).order('ordem'),
  ]);
  for(const r of [obras,elementos,concreteiras,motivos,fck,slump,tol,desc]) if(r.error) throw r.error;
  cache.obras=obras.data; cache.elementos=elementos.data; cache.concreteiras=concreteiras.data; cache.motivos=motivos.data;
  document.getElementById('dl_fck').innerHTML  = fck.data.map(x=>`<option value="${x.valor}">`).join('');
  document.getElementById('dl_slump').innerHTML= slump.data.map(x=>`<option value="${x.valor}">`).join('');
  document.getElementById('dl_tol').innerHTML  = tol.data.map(x=>`<option value="${x.valor}">`).join('');
  document.getElementById('dl_desc').innerHTML = desc.data.map(x=>`<option value="${(x.nome||'').replace(/"/g,'&quot;')}">`).join('');
}
async function pavimentosDe(obraId){
  if(cache.pavsPorObra[obraId]) return cache.pavsPorObra[obraId];
  const { data, error } = await sb.from('pavimentos').select('*').eq('obra_id',obraId).order('ordem',{ascending:false});
  if(error) throw error;
  cache.pavsPorObra[obraId]=data; return data;
}

// ---------- HOME ----------
function verHome(){
  tela='home';

    <button class="homebtn" onclick="verPendentes()"><span class="hi">✎</span><span><b>Pendentes de coleta de assinatura</b><small>coletar assinaturas que faltam</small></span></button>`;
}
function aviso(o){ alert(o+' — esta tela ainda será construída.'); }

// ---------- ABRIR CONCRETAGEM ----------
async function abrirConcretagem(){
  tela='abrir';
  screen.innerHTML = casca('Nova concretagem', {back:true});
  if(!draft.obraId && cache.obras.length){ draft.obraId=cache.obras[0].id; draft.obraNome=cache.obras[0].nome; }
  if(!draft.elementoId && cache.elementos.length){ draft.elementoId=cache.elementos[0].id; }
  if(!draft.concreteiraId && cache.concreteiras.length){ draft.concreteiraId=cache.concreteiras[0].id; }
  if(!draft.tracos.length) draft.tracos.push({fck:'',slump:'16',tol:'3',desc:''});
  await desenharAbrir();
}
async function desenharAbrir(){
  const body=document.getElementById('body'), foot=document.getElementById('foot');
  const pavs = await pavimentosDe(draft.obraId);
  if(!draft.pavId && pavs.length){ draft.pavId=pavs[0].id; draft.pavNome=pavs[0].nome; }
  const obrasOpt = cache.obras.map(o=>`<option value="${o.id}" ${o.id===draft.obraId?'selected':''}>${o.nome}</option>`).join('');
  const pavsOpt  = pavs.map(p=>`<option value="${p.id}" ${p.id===draft.pavId?'selected':''}>${p.nome}</option>`).join('');
  const elemOpt  = cache.elementos.map(e=>`<option value="${e.id}" ${e.id===draft.elementoId?'selected':''}>${e.nome}</option>`).join('');
  const concOpt  = cache.concreteiras.map(c=>`<option value="${c.id}" ${c.id===draft.concreteiraId?'selected':''}>${c.nome}</option>`).join('');
  let html = `
    <div class="row"><label class="fld">Obra</label><select onchange="mudarObra(this.value)">${obrasOpt}</select></div>
    <div class="row"><label class="fld">Pavimento</label><select onchange="setPav(this.value)">${pavsOpt}</select></div>
    <div class="row"><label class="fld">Elemento concretado</label><select onchange="draft.elementoId=+this.value">${elemOpt}</select></div>
    <div class="row"><label class="fld">Concreteira</label><select onchange="draft.concreteiraId=+this.value">${concOpt}</select></div>
    <div class="fldlabel">Traços desta concretagem</div>`;
  draft.tracos.forEach((t,i)=>{
    html += `<div class="tcard">${draft.tracos.length>1?`<button class="x" onclick="rmTraco(${i})">✕</button>`:''}
      <div class="three">
        <div class="row" style="margin-bottom:10px"><label class="fld">fck</label><input list="dl_fck" inputmode="decimal" value="${t.fck}" placeholder="—" onchange="draft.tracos[${i}].fck=this.value"></div>
        <div class="row" style="margin-bottom:10px"><label class="fld">Slump</label><input list="dl_slump" inputmode="decimal" value="${t.slump}" onchange="draft.tracos[${i}].slump=this.value"></div>
        <div class="row" style="margin-bottom:10px"><label class="fld">±</label><input list="dl_tol" inputmode="decimal" value="${t.tol}" onchange="draft.tracos[${i}].tol=this.value"></div>
      </div>
      <div class="row" style="margin-bottom:0"><label class="fld">Descrição</label><input list="dl_desc" value="${t.desc||''}" placeholder="opcional" onchange="draft.tracos[${i}].desc=this.value"></div>
    </div>`;
  });
  html += `<button class="bigbtn ghost" onclick="addTraco()">+ adicionar traço</button>`;
  body.innerHTML = html;
  foot.style.display=''; foot.innerHTML = `<button class="bigbtn" onclick="iniciar()">Iniciar ▸</button>`;
}
async function mudarObra(v){ draft.obraId=+v; const o=cache.obras.find(x=>x.id===+v); draft.obraNome=o?o.nome:null; draft.pavId=null; draft.pavNome=null; await desenharAbrir(); }
function setPav(v){ draft.pavId=+v; const p=(cache.pavsPorObra[draft.obraId]||[]).find(x=>x.id===+v); draft.pavNome=p?p.nome:null; }
function addTraco(){ draft.tracos.push({fck:'',slump:'16',tol:'3',desc:''}); desenharAbrir(); }
function rmTraco(i){ draft.tracos.splice(i,1); desenharAbrir(); }
function iniciar(){
  if(!draft.tracos.some(t=>String(t.fck).trim())){ alert('Informe o fck de ao menos um traço.'); return; }
  // só mantém traços com fck preenchido
  draft.tracos = draft.tracos.filter(t=>String(t.fck).trim());
  draft.betoneiras = [];
  draft.concId = null;
  draft.totalCP = 0;
  draft.cur = novaBetoneira();
  telaBetoneira();
}

// ---------- TELA BETONEIRA ----------
function telaBetoneira(){
  tela='betoneira';
  screen.innerHTML = casca('Dados iniciais', {back:true});
  desenharBetoneira();
}
function desenharBetoneira(){
  const body=document.getElementById('body'), foot=document.getElementById('foot');
  const cur=draft.cur;
  const tracoOpt = draft.tracos.map((t,i)=>`<option value="${i}" ${i===cur.tracoIdx?'selected':''}>fck ${t.fck}${t.slump?` · ${t.slump}±${t.tol}`:''}${t.desc?' · '+t.desc:''}</option>`).join('');
  const nBt = draft.betoneiras.length;
  let html = `
    <div style="background:var(--accent-soft);border:1.5px solid #e3c3a6;border-radius:12px;padding:12px 14px;margin:-2px 0 16px">
      <div style="font-size:22px;font-weight:800;color:var(--accent-ink);line-height:1.1">Betoneira ${nBt+1}</div>
      <div class="sub" style="margin-top:4px"><b>${draft.obraNome}</b> · ${draft.pavNome}</div>
    </div>
    <div class="row"><label class="fld">Traço</label><select onchange="draft.cur.tracoIdx=+this.value">${tracoOpt}</select></div>
    <div class="two" style="display:flex;gap:10px">
      <div class="row" style="flex:1"><label class="fld">Nota fiscal</label><input value="${cur.nf}" inputmode="numeric" onchange="draft.cur.nf=this.value" placeholder="NF"></div>
      <div class="row" style="flex:1"><label class="fld">Lacre</label><input value="${cur.lacre}" inputmode="numeric" onchange="draft.cur.lacre=this.value" placeholder="—"></div>
    </div>
    <div class="two" style="display:flex;gap:10px">
      <div class="row" style="flex:1"><label class="fld">Chegada</label><input value="${cur.hora}" inputmode="numeric" maxlength="5" placeholder="hh:mm" oninput="mascararHora(this)" onchange="draft.cur.hora=this.value"></div>
      <div class="row" style="flex:1"><label class="fld">Slump medido</label><input value="${cur.slump}" inputmode="numeric" maxlength="4" placeholder="cm" oninput="mascararSlump(this)" onchange="draft.cur.slump=this.value"></div>
    </div>
    <div class="two" style="display:flex;gap:10px">
      <div class="row" style="flex:1"><label class="fld">Água (L)</label><input value="${cur.agua}" inputmode="decimal" onchange="draft.cur.agua=this.value"></div>
      <div class="row" style="flex:1"><label class="fld">Volume (m³)</label><input value="${cur.volume}" inputmode="decimal" onchange="draft.cur.volume=this.value" placeholder="—"></div>
    </div>

    <div class="fldlabel">Aceite da betoneira</div>
    <div style="display:flex;gap:10px;margin-bottom:6px">
      <button class="ar ${cur.aceita?'on-a':''}" onclick="setAceite(true)">ACEITAR</button>
      <button class="ar ${!cur.aceita?'on-r':''}" onclick="setAceite(false)">RECUSAR</button>
    </div>`;

  if(cur.aceita){
    html += `<div class="fldlabel">Corpos de prova moldados</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="chipbtn ${cur.cpModo==='preset'&&cur.cpQtd===4?'on':''}" onclick="setCp(4)">4</button>
        <button class="chipbtn ${cur.cpModo==='preset'&&cur.cpQtd===6?'on':''}" onclick="setCp(6)">6</button>
        <button class="chipbtn ${cur.cpModo==='outro'?'on':''}" onclick="setCpOutro()">Outro</button>
        ${cur.cpModo==='outro'?`<input style="width:90px;min-height:46px" inputmode="numeric" value="${cur.cpQtd||''}" placeholder="qtd" onchange="draft.cur.cpQtd=parseInt(this.value)||0">`:''}
      </div>`;
  } else {
    const motOpt = ['<option value="" '+(cur.motivoId?'':'selected')+' disabled>selecione…</option>']
      .concat(cache.motivos.map(m=>`<option value="${m.id}" ${cur.motivoId===m.id?'selected':''}>${m.nome}</option>`)).join('');
    html += `<div class="row"><label class="fld">Motivo da recusa <span style="color:var(--accent)">— obrigatório</span></label>
        <select onchange="draft.cur.motivoId=+this.value">${motOpt}</select></div>
      <div class="note" style="font-size:12.5px;color:var(--muted);background:#f3f0e7;border-radius:10px;padding:11px;margin-top:2px">Betoneira recusada — não se molda corpo de prova nesta NF.</div>`;
  }
  html += `<div class="row" style="margin-top:14px"><label class="fld">Observações</label><input value="${cur.obs||''}" onchange="draft.cur.obs=this.value" placeholder="opcional"></div>`;
  body.innerHTML = html;

  foot.style.display='';
  foot.innerHTML = `
    <button class="bigbtn" onclick="proximaBetoneira()">Próxima betoneira ▸</button>
    <button class="bigbtn ghost" onclick="confirmarFinalizar()">Finalizar concretagem</button>`;
}
function setAceite(a){ draft.cur.aceita=a; if(a&&!draft.cur.cpQtd){draft.cur.cpQtd=4;draft.cur.cpModo='preset';} desenharBetoneira(); }
function setCp(n){ draft.cur.cpQtd=n; draft.cur.cpModo='preset'; desenharBetoneira(); }
function setCpOutro(){ draft.cur.cpModo='outro'; draft.cur.cpQtd=0; desenharBetoneira(); }

function validarBetoneira(){
  const c=draft.cur;
  if(!String(c.nf).trim()){ alert('Informe a nota fiscal.'); return false; }
  if(!(parseFloat(String(c.volume).replace(',','.'))>0)){ alert('Informe o volume (m³).'); return false; }
  if(c.aceita){ if(!(c.cpQtd>0)){ alert('Informe quantos CPs foram moldados.'); return false; } }
  else { if(!c.motivoId){ alert('Selecione o motivo da recusa.'); return false; } }
  return true;
}

// betoneira atual "em branco" = usuário não começou a preencher (sem NF e sem volume)
function betoneiraVazia(){
  const c=draft.cur||{};
  const semNF = !String(c.nf||'').trim();
  const semVol = !(parseFloat(String(c.volume||'').replace(',','.'))>0);
  const semObs = !String(c.obs||'').trim();
  return semNF && semVol && semObs;
}

const num = v => { const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n; };

// garante que a concretagem existe no banco (cria na 1ª vez)
async function garantirConcretagem(){
  if(draft.concId) return draft.concId;
  const hoje = new Date().toISOString().slice(0,10);
  const { data, error } = await sb.from('concretagens').insert({
    obra_id:draft.obraId, pavimento_id:draft.pavId, elemento_id:draft.elementoId,
    concreteira_id:draft.concreteiraId, data_concretagem:hoje, responsavel:userEmail, responsavel_nome:nomeUsuario||null
  }).select().single();
  if(error) throw error;
  draft.concId = data.id;
  return data.id;
}

// grava a betoneira atual + CPs; devolve {numeros:[...], recusada:bool}
async function gravarBetoneiraAtual(){
  const b = draft.cur;
  const t = draft.tracos[b.tracoIdx]||{};
  const concId = await garantirConcretagem();
  const { data:bet, error:e2 } = await sb.from('betoneiras').insert({
    concretagem_id:concId, fck:num(t.fck), nota_fiscal:String(b.nf),
    lacre:b.lacre||null, hora_chegada:b.hora||null, slump_medido:num(b.slump),
    slump_especificado:num(t.slump), tolerancia:num(t.tol), traco_descricao:(t.desc||null),
    agua_adicionada:num(b.agua)||0, volume:num(b.volume)||0,
    aceita:b.aceita, motivo_recusa_id:b.aceita?null:b.motivoId, observacao:b.obs||null
  }).select().single();
  if(e2) throw e2;
  let numeros=[];
  if(b.aceita && b.cpQtd>0){
    const linhas = Array.from({length:b.cpQtd}).map(()=>({ betoneira_id:bet.id }));
    const { data:cps, error:e3 } = await sb.from('corpos_prova').insert(linhas).select('numero');
    if(e3) throw e3;
    numeros = cps.map(c=>c.numero).sort((a,b)=>a-b);
    draft.totalCP += numeros.length;
  }
  b.salva=true;
  draft.betoneiras.push(b);
  return { numeros, recusada:!b.aceita, nf:b.nf };
}

// ação dos botões: grava e mostra confirmação
async function gravarESeguir(modo){ // modo: 'proxima' | 'finalizar'
  if(!validarBetoneira()) return;
  const foot=document.getElementById('foot');
  const orig = foot.innerHTML;
  foot.innerHTML = `<button class="bigbtn" disabled>Gravando…</button>`;
  try{
    const r = await gravarBetoneiraAtual();
    telaConfirmaBetoneira(r, modo);
  }catch(e){
    foot.innerHTML = orig;
    const body=document.getElementById('body');
    body.insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui gravar a betoneira.</b><br>'+(e&&e.message?e.message:e)+'</div>');
    window.scrollTo(0,0);
  }
}
function proximaBetoneira(){ gravarESeguir('proxima'); }
function finalizar(){ gravarESeguir('finalizar'); }
// pergunta antes de finalizar (evita finalizar por engano)
function confirmarFinalizar(){
  const temBetoneiras = (draft.betoneiras&&draft.betoneiras.length>0);
  // Se a betoneira atual está em branco: finalizar só o que já existe (não obriga preencher)
  if(betoneiraVazia()){
    if(!temBetoneiras){ alert('Esta concretagem ainda não tem nenhuma betoneira lançada. Registre ao menos uma betoneira antes de finalizar.'); return; }
    if(confirm('Finalizar a concretagem?\n\nNenhuma betoneira nova será adicionada — a concretagem será encerrada com as betoneiras já lançadas.')) finalizarSemGravar();
    return;
  }
  // Caso normal: há uma betoneira preenchida → valida, grava e finaliza
  if(!validarBetoneira()) return;
  if(confirm('Tem certeza que deseja finalizar a concretagem?\n\nA betoneira atual será gravada e a concretagem encerrada.')) finalizar();
}
// encerra a concretagem existente sem gravar betoneira nova
async function finalizarSemGravar(){
  const foot=document.getElementById('foot');
  const orig = foot.innerHTML;
  foot.innerHTML = `<button class="bigbtn" disabled>Finalizando…</button>`;
  try{
    await garantirConcretagem();
    await verResumoFinal();
  }catch(e){
    foot.innerHTML = orig;
    const body=document.getElementById('body');
    body.insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui finalizar.</b><br>'+(e&&e.message?e.message:e)+'</div>');
    window.scrollTo(0,0);
  }
}

// ---------- ASSINATURA ----------
function telaAssinatura(concId, titulo, origem){
  assinaturaCtx = { concId, titulo, origem };
  tela='assinatura';
  screen.innerHTML = casca('Responsável da Engenharia', {back:false});
  const body=document.getElementById('body'), foot=document.getElementById('foot');
  body.innerHTML = `
    <div class="sub" style="margin:-2px 0 14px"><b>${titulo}</b></div>
    <div class="note" style="font-size:12.5px;color:var(--muted);background:#f3f0e7;border-radius:10px;padding:11px;margin-bottom:14px">Assinatura do Responsável da Engenharia que acompanhou a concretagem — confirma estar ciente de tudo que foi registrado.</div>
    <div class="row"><label class="fld">Nome do Responsável da Engenharia</label>
      <input id="ass_nome" placeholder="nome de quem acompanhou"></div>
    <div class="fldlabel">Assinatura</div>
    <div class="sub" style="font-size:12.5px;margin:-2px 0 8px">Peça ao Responsável da Engenharia para assinar com o dedo na área abaixo.</div>
    <canvas id="sigpad" style="width:100%;height:200px;background:#fff;border:1.5px dashed var(--accent);border-radius:14px;touch-action:none;display:block"></canvas>
    <button class="bigbtn ghost" style="margin-top:10px" onclick="window._sigClear&&window._sigClear()">Limpar</button>`;
  foot.style.display='';
  foot.innerHTML = `
    <button class="bigbtn" onclick="confirmarAssinatura()">Confirmar assinatura</button>
    <button class="bigbtn ghost" onclick="cancelarAssinatura()">Voltar</button>`;
  initSig();
}
function initSig(){
  const c=document.getElementById('sigpad'); if(!c) return;
  c.width=c.clientWidth; c.height=200;
  const ctx=c.getContext('2d'); ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0E0E0E';
  let drawing=false, has=false;
  const pos=e=>{ const r=c.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };
  c.addEventListener('pointerdown',e=>{ drawing=true; has=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); c.setPointerCapture(e.pointerId); });
  c.addEventListener('pointermove',e=>{ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  c.addEventListener('pointerup',()=>{ drawing=false; });
  window._sigHas=()=>has; window._sigClear=()=>{ ctx.clearRect(0,0,c.width,c.height); has=false; };
}
async function confirmarAssinatura(){
  const nome=(document.getElementById('ass_nome').value||'').trim();
  if(!nome){ alert('Informe o nome de quem está assinando.'); return; }
  if(window._sigHas && !window._sigHas()){ alert('Colete a assinatura antes de confirmar.'); return; }
  const img=document.getElementById('sigpad').toDataURL('image/png');
  const foot=document.getElementById('foot'), orig=foot.innerHTML;
  foot.innerHTML='<button class="bigbtn" disabled>Salvando…</button>';
  try{
    const { error } = await sb.from('concretagens').update({
      assinado:true, assinante_nome:nome, assinatura_img:img, assinado_em:new Date().toISOString()
    }).eq('id', assinaturaCtx.concId);
    if(error) throw error;
    telaAssinaturaOk();
  }catch(e){
    foot.innerHTML=orig;
    document.getElementById('body').insertAdjacentHTML('afterbegin','<div class="erro"><b>Não consegui salvar a assinatura.</b><br>'+(e&&e.message?e.message:e)+'</div>');
    window.scrollTo(0,0);
  }
}
function cancelarAssinatura(){
  if(assinaturaCtx && assinaturaCtx.origem==='detalhe') telaResumoConcretagem(assinaturaCtx.concId, detalheOrigem);
  else verResumoFinal();
}
function telaAssinaturaOk(){
  tela='assinaturaOk';
  const voltarFn = (assinaturaCtx && assinaturaCtx.origem==='detalhe')
    ? `telaResumoConcretagem(${assinaturaCtx.concId},'${detalheOrigem}')`
    : 'zerarEVoltar()';
  screen.innerHTML = casca('Assinatura coletada', {back:false});
  document.getElementById('body').innerHTML = `<div style="text-align:center;padding:24px 6px">
    <div style="font-size:46px">✓</div>
    <div style="font-weight:700;font-size:19px;margin:6px 0 4px;color:var(--ok)">Assinatura coletada!</div>
    <div class="sub">Concretagem assinada e registrada.</div></div>`;
  const foot=document.getElementById('foot'); foot.style.display='';
  foot.innerHTML = `<button class="bigbtn" onclick="${voltarFn}">Concluir</button>`;
}

// ---------- CONCLUÍDAS / PENDENTES ----------
// tipo: 'concluidas' (assinadas) | 'pendentes' (a assinar)
async function buscarConcretagens(tipo){
  const { data, error } = await sb.from('concretagens')
    .select('id,data_concretagem,assinado,assinante_nome,obras!inner(nome),pavimentos!inner(nome),betoneiras(volume,aceita)')
    .eq('finalizada', true)
    .eq('assinado', tipo==='concluidas')
    .order('data_concretagem',{ascending:false});
  if(error) throw error;
  return data||[];
}
function cardConcretagem(m, origem){
  const bts=m.betoneiras||[];
  const aceitas=bts.filter(b=>b.aceita).length;
  const recusas=bts.length-aceitas;
  const vol=bts.filter(b=>b.aceita).reduce((s,b)=>s+(Number(b.volume)||0),0);
  const status = m.assinado
    ? `<span style="display:inline-block;margin-top:10px;background:#eaf3ec;color:var(--ok);border:1px solid #bcd2bf;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700">assinada${m.assinante_nome?' · '+m.assinante_nome:''}</span>`
    : `<span style="display:inline-block;margin-top:10px;background:#f3f0e7;color:var(--muted);border:1px solid #e2dcca;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700">assinatura pendente</span>`;
  return `<div class="tcard" style="cursor:pointer" onclick="telaResumoConcretagem(${m.id},'${origem}')">
    <div style="font-weight:700">${m.obras.nome} · ${m.pavimentos.nome}</div>
    <div class="sub" style="margin-top:6px">${fmtData(m.data_concretagem)} · ${aceitas} betoneira(s)${recusas?' · '+recusas+' recusa(s)':''} · ${vol.toFixed(1)} m³</div>
    ${status}
    <div style="margin-top:8px;color:var(--accent);font-size:12.5px;font-weight:700">ver resumo ›</div>
  </div>`;
}

}
async function verPendentes(){

// reabre uma concretagem não finalizada, recarregando o draft com o que já existe
async function continuarConcretagem(concId){
  const body=document.getElementById('body'); if(body) body.innerHTML='<div class="estado">Abrindo…</div>';
  try{
    const { data:c, error:e1 } = await sb.from('concretagens')
      .select('id,obra_id,pavimento_id,elemento_id,concreteira_id,data_concretagem,obras!inner(nome),pavimentos!inner(nome),'+
              'betoneiras(id,aceita,fck,slump_especificado,tolerancia,traco_descricao)')
      .eq('id', concId).single();
    if(e1) throw e1;
    // garante que os caches (obras/elementos/concreteiras) estão carregados
    if(!cache.obras.length){
      const [obras,elementos,concreteiras] = await Promise.all([
        sb.from('obras').select('*').eq('ativa',true).order('nome'),
        sb.from('elementos').select('*').eq('ativo',true).order('ordem'),
        sb.from('concreteiras').select('*').eq('ativa',true).order('nome'),
      ]);
      if(obras.data) cache.obras=obras.data;
      if(elementos.data) cache.elementos=elementos.data;
      if(concreteiras.data) cache.concreteiras=concreteiras.data;
    }
    await pavimentosDe(c.obra_id);
    // reconstrói o draft
    draft.concId = c.id;
    draft.obraId = c.obra_id; draft.obraNome = c.obras.nome;
    draft.pavId = c.pavimento_id; draft.pavNome = c.pavimentos.nome;
    draft.elementoId = c.elemento_id; draft.concreteiraId = c.concreteira_id;
    draft.data = c.data_concretagem;
    // traços: a partir das betoneiras já lançadas (distintos); se nenhuma, usa um padrão
    const bts = c.betoneiras||[];
    const vistos={}; const tracos=[];
    bts.forEach(b=>{
      const k=[b.fck,b.slump_especificado,b.tolerancia,b.traco_descricao].join('|');
      if(!vistos[k]){ vistos[k]=1; tracos.push({fck:b.fck!=null?String(b.fck):'', slump:b.slump_especificado!=null?String(b.slump_especificado):'16', tol:b.tolerancia!=null?String(b.tolerancia):'3', desc:b.traco_descricao||''}); }
    });
    draft.tracos = tracos.length? tracos : [{fck:'',slump:'16',tol:'3',desc:''}];
    draft.betoneiras = bts.map(b=>({id:b.id, salva:true, aceita:b.aceita}));
    draft.totalCP = 0;
    draft.cur = novaBetoneira();
    telaBetoneira();
  }catch(e){ erro(e); }
}

// ---------- RESUMO / DETALHE DE UMA CONCRETAGEM ----------
async function buscarConcretagemDetalhe(concId){
  const { data, error } = await sb.from('concretagens')
    .select('id,data_concretagem,responsavel,responsavel_nome,assinado,assinante_nome,assinatura_img,assinado_em,obras!inner(nome),pavimentos!inner(nome),elementos(nome),concreteiras(nome),betoneiras(id,nota_fiscal,lacre,hora_chegada,fck,slump_especificado,tolerancia,traco_descricao,slump_medido,agua_adicionada,volume,aceita,observacao,motivos_recusa(nome),corpos_prova(numero))')
    .eq('id', concId).single();
  if(error) throw error;
  return data;
}
async function telaResumoConcretagem(concId, origem){
  detalheOrigem = origem || 'concluidas';
  tela='detalhe';
  screen.innerHTML = casca('Resumo da concretagem', {back:true});
  document.getElementById('foot').style.display='none';
  const body=document.getElementById('body'); body.innerHTML='<div class="estado">Carregando…</div>';
  try{
    const d = await buscarConcretagemDetalhe(concId);
    detalheAtual = d;
    renderResumoConcretagem(d);
  }catch(e){ erro(e); }
}
function renderResumoConcretagem(d){
  const body=document.getElementById('body'), foot=document.getElementById('foot');
  const bts=(d.betoneiras||[]).slice().sort((a,b)=>String(a.nota_fiscal).localeCompare(String(b.nota_fiscal),undefined,{numeric:true}));
  const aceitas=bts.filter(b=>b.aceita), recusadas=bts.filter(b=>!b.aceita);
  const totalCP=bts.reduce((s,b)=>s+((b.corpos_prova||[]).length),0);
  const volTotal=aceitas.reduce((s,b)=>s+(Number(b.volume)||0),0);
  const linhas = bts.map(b=>{
    const cps=(b.corpos_prova||[]).map(c=>c.numero).sort((x,y)=>x-y);
    const motivo = b.aceita ? '' : (b.motivos_recusa&&b.motivos_recusa.nome?` · motivo: ${b.motivos_recusa.nome}`:'');
    return `<div style="border-top:1px solid var(--line);padding:9px 0">
      <div style="font-weight:700">NF ${b.nota_fiscal} · ${b.aceita?'<span style="color:var(--ok)">aceita</span>':'<span style="color:var(--bad)">recusada</span>'}${motivo}</div>
      <div class="sub" style="margin-top:3px"||'—'} · slump ${b.slump_medido!=null?b.slump_medido:'—'} cm · água ${b.agua_adicionada!=null?b.agua_adicionada:'—'} L · ${Number(b.volume||0).toFixed(1)} m³ · chegada ${b.hora_chegada||'—'}${b.lacre?' · lacre '+b.lacre:''}</div>
      ${b.aceita&&cps.length?`<div class="sub" style="margin-top:3px">CPs: ${cps.join(' · ')}</div>`:''}
      ${b.observacao?`<div class="sub" style="margin-top:3px">Obs: ${b.observacao}</div>`:''}
    </div>`;
  }).join('');
  const tracos = agruparTracos(bts);
  const tracosHtml = tracos.map(g=>{
    const lbl = labelTraco(g);
    return `<div style="border-top:1px solid var(--line);padding:8px 0"><div style="font-weight:600">${lbl}</div></div>`;
  }).join('');
  const assinaturaBloco = d.assinado
    ? `<div class="tcard"><b>Responsável da Engenharia</b>
        <div class="sub" style="margin-top:6px">Assinado por <b>${d.assinante_nome||'—'}</b>${d.assinado_em?` · ${fmtData(d.assinado_em)}`:''}</div>
        ${d.assinatura_img?`<img src="${d.assinatura_img}" alt="assinatura" style="margin-top:8px;width:100%;max-width:280px;height:90px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:10px;display:block">`:''}
      </div>`
    : `<div class="tcard" style="border-style:dashed"><b>Responsável da Engenharia</b>
        <div class="sub" style="margin-top:6px">Assinatura ainda pendente.</div></div>`;
  body.innerHTML = `
    <div style="font-weight:700;font-size:18px">${d.obras.nome} · ${d.pavimentos.nome}</div>
    <div class="sub" style="margin:4px 0 14px">${fmtData(d.data_concretagem)} · ${(d.elementos&&d.elementos.nome)||'—'} · ${(d.concreteiras&&d.concreteiras.nome)||'—'} · por ${d.responsavel_nome||d.responsavel||'—'}</div>
    <div class="tcard"><b>Resumo</b>
      <div class="sub" style="margin-top:6px;line-height:1.7">
        Betoneiras: <b>${bts.length}</b> (${aceitas.length} aceita(s)${recusadas.length?', '+recusadas.length+' recusa(s)':''})<br>
        Corpos de prova: <b>${totalCP}</b> · Volume aceito: <b>${volTotal.toFixed(1)} m³</b>
      </div>
    </div>
    <div class="tcard"><b>Traços</b>${tracosHtml||'<div class="sub" style="margin-top:6px">—</div>'}</div>
    <div class="tcard"><b>Betoneiras</b>${linhas}</div>
    ${assinaturaBloco}`;
  foot.style.display='';
  const btnSign = d.assinado ? '' : `<button class="bigbtn ghost" onclick="telaAssinatura(${d.id},'${(d.obras.nome+' · '+d.pavimentos.nome).replace(/'/g,'')}','detalhe')">Coletar assinatura</button>`;
  foot.innerHTML = `<button class="bigbtn" onclick="exportarConcretagemPDF()">Exportar PDF</button>${btnSign}`;
}
function labelTraco(g){
  const has=v=>v!==null && v!==undefined && String(v).trim()!=='';
  let s = `fck ${has(g.fck)?g.fck:'—'}`;
  if(has(g.slump)) s += ` · ${g.slump}±${has(g.tol)?g.tol:'?'}`;
  if(has(g.desc))  s += ` · ${g.desc}`;
  return s;
}
function agruparTracos(bts){
  const map={};
  (bts||[]).forEach(b=>{
    const key=[b.fck, b.slump_especificado, b.tolerancia, b.traco_descricao||''].join('|');
    if(!map[key]) map[key]={ fck:b.fck, slump:b.slump_especificado, tol:b.tolerancia, desc:b.traco_descricao, bt:0, vol:0, cp:0 };
    const g=map[key]; g.bt++; if(b.aceita){ g.vol+=(Number(b.volume)||0); g.cp+=((b.corpos_prova||[]).length); }
  });
  return Object.values(map);
}

// ---------- PDF DA CONCRETAGEM ----------
function exportarConcretagemPDF(){
  const d = detalheAtual;
  if(!d) return;
  if(!window.jspdf || !window.jspdf.jsPDF){ alert('A biblioteca de PDF não carregou. Verifique a conexão e recarregue a página.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const accent=[189,93,39], ink=[14,14,14], muted=[122,116,106];
  const hoje=new Date();
  const ger = String(hoje.getDate()).padStart(2,'0')+'/'+String(hoje.getMonth()+1).padStart(2,'0')+'/'+hoje.getFullYear();

  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(ink[0],ink[1],ink[2]);
  doc.text('GT&ABC · Controle Tecnológico de Concreto', 14, 16);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(accent[0],accent[1],accent[2]);
  doc.text('Relatório de Concretagem', 14, 22);
  doc.setFontSize(8); doc.setTextColor(muted[0],muted[1],muted[2]);
  doc.text('Gerado em '+ger, pageW-14, 16, {align:'right'});

  const info = [
    ['Obra', d.obras.nome], ['Pavimento', d.pavimentos.nome],
    ['Elemento', (d.elementos&&d.elementos.nome)||'—'], ['Concreteira', (d.concreteiras&&d.concreteiras.nome)||'—'],
    ['Data', fmtData(d.data_concretagem)], ['Responsável', d.responsavel_nome||d.responsavel||'—']
  ];
  doc.autoTable({
    body: info.map(r=>[{content:r[0],styles:{fontStyle:'bold',cellWidth:36}}, r[1]]),
    startY:28, theme:'plain',
    styles:{font:'helvetica',fontSize:9,cellPadding:1.1,textColor:[14,14,14]}, margin:{left:14,right:14}
  });

  const bts=(d.betoneiras||[]).slice().sort((a,b)=>String(a.nota_fiscal).localeCompare(String(b.nota_fiscal),undefined,{numeric:true}));
  const aceitas=bts.filter(b=>b.aceita), recusadas=bts.filter(b=>!b.aceita);
  const totalCP=bts.reduce((s,b)=>s+((b.corpos_prova||[]).length),0);
  const volTotal=aceitas.reduce((s,b)=>s+(Number(b.volume)||0),0);

  // ----- Traços (indicação dos traços, antes da tabela de betoneiras) -----
  const tracos = agruparTracos(bts);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(accent[0],accent[1],accent[2]);
  doc.text('Traços', 14, doc.lastAutoTable.finalY + 6);
  doc.autoTable({
    body: tracos.map(g=>[ labelTraco(g) ]),
    startY: doc.lastAutoTable.finalY + 9, theme:'grid',
    styles:{font:'helvetica',fontSize:8.5,cellPadding:1.8,overflow:'linebreak',lineColor:[234,226,198],lineWidth:0.1,textColor:[14,14,14]},
    margin:{left:14,right:14}
  });

  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(accent[0],accent[1],accent[2]);
  doc.text('Betoneiras', 14, doc.lastAutoTable.finalY + 6);
  const head=[['NF','Lacre','Hora','fck','Slump (cm)','Água (L)','Vol (m³)','Aceite','Motivo','CPs']];
  const linhasPdf=bts.map(b=>{
    const cps=(b.corpos_prova||[]).map(c=>c.numero).sort((x,y)=>x-y).join(' ');
    return [ String(b.nota_fiscal), b.lacre||'—', b.hora_chegada||'—', b.fck!=null?String(b.fck):'—',
      b.slump_medido!=null?String(b.slump_medido):'—', b.agua_adicionada!=null?String(b.agua_adicionada):'—',
      Number(b.volume||0).toFixed(1), b.aceita?'Aceita':'Recusada',
      b.aceita?'—':((b.motivos_recusa&&b.motivos_recusa.nome)||'—'), b.aceita?(cps||'—'):'—' ];
  });
  doc.autoTable({
    head, body:linhasPdf, startY: doc.lastAutoTable.finalY + 9, theme:'grid',
    styles:{font:'helvetica',fontSize:7.5,cellPadding:1.5,overflow:'linebreak',lineColor:[234,226,198],lineWidth:0.1,textColor:[14,14,14]},
    headStyles:{fillColor:accent,textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
    columnStyles:{ 3:{halign:'center'}, 4:{halign:'center'}, 5:{halign:'right'}, 6:{halign:'right'} },
    didParseCell:(dt)=>{ if(dt.section==='body' && dt.column.index===7 && dt.cell.raw==='Recusada'){ dt.cell.styles.textColor=[176,42,32]; dt.cell.styles.fontStyle='bold'; } },
    margin:{left:14,right:14}
  });

  let y = doc.lastAutoTable.finalY + 7;
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(ink[0],ink[1],ink[2]);
  doc.text(`Total: ${bts.length} betoneira(s) · ${aceitas.length} aceita(s) · ${recusadas.length} recusa(s) · ${totalCP} CPs · ${volTotal.toFixed(1)} m³`, 14, y);

  y += 14;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(muted[0],muted[1],muted[2]);
  doc.text('Responsável da Engenharia:', 14, y);
  if(d.assinado){
    doc.setTextColor(ink[0],ink[1],ink[2]); doc.setFont('helvetica','bold');
    doc.text((d.assinante_nome||'—')+(d.assinado_em?`    ·    ${fmtData(d.assinado_em)}`:''), 14, y+6);
    if(d.assinatura_img){ try{ doc.addImage(d.assinatura_img, 'PNG', 14, y+9, 80, 30); }catch(_){ } }
    doc.setDrawColor(170); doc.line(14, y+41, 94, y+41);
  } else {
    doc.setFont('helvetica','bold'); doc.text('assinatura pendente', 14, y+6);
  }

  const ph=doc.internal.pageSize.getHeight();
  doc.setFontSize(7); doc.setTextColor(muted[0],muted[1],muted[2]); doc.setFont('helvetica','normal');
  doc.text('GT Home & ABC — Controle Tecnológico de Concreto', 14, ph-8);

  const slug=(d.obras.nome+'_'+d.pavimentos.nome).replace(/[^a-z0-9]+/gi,'-').toLowerCase();
  doc.save('concretagem_'+slug+'_'+fmtData(d.data_concretagem).replace(/\//g,'-')+'.pdf');
}

function zerarEVoltar(){
  draft.obraId=null; draft.obraNome=null; draft.pavId=null; draft.pavNome=null;
  draft.elementoId=null; draft.concreteiraId=null; draft.tracos=[]; draft.betoneiras=[]; draft.cur=null;
  draft.concId=null; draft.totalCP=0;
  verHome();
}
function voltar(){
  if(tela==='abrir') verHome();
  else if(tela==='betoneira'){ if(draft.betoneiras.length){ if(confirm('Voltar para os dados da concretagem? As betoneiras já gravadas continuam salvas.')) abrirConcretagem(); } else abrirConcretagem(); }
  else if(tela==='concluidas' || tela==='pendentes' || tela==='andamento') verHome();
  else if(tela==='detalhe'){ if(detalheOrigem==='pendentes') verPendentes(); else if(detalheOrigem==='andamento') verAndamento(); else verConcluidas(); }
}

// ---------- INÍCIO ----------
async function iniciarApp(){
  screen.innerHTML = '<div class="estado" style="padding:48px 20px;text-align:center">Carregando…</div>';
  // confere o crachá do usuário logado
  let _erroCracha = '';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ _erroCracha = 'Sessão não encontrada. Saia e entre novamente.'; }
    else {
      const { data, error } = await sb.rpc('meus_perfis');
      if(error) _erroCracha = error.message;
      else perfisUsuario = Array.isArray(data) ? data : [];
      try{ const rn = await sb.rpc('meu_nome'); if(!rn.error && rn.data) nomeUsuario = rn.data; }catch(_){}
    }
  }catch(e){ _erroCracha = (e && e.message) ? e.message : String(e); }
  if(!perfisUsuario.some(p=>PERFIS_OK.includes(p))){ telaSemAcesso(_erroCracha); return; }
  screen.innerHTML = casca('Concretagem',{back:false});
  document.getElementById('body').innerHTML = '<div class="estado">Carregando dados…</div>';
  try{ await carregarCadastros(); verHome(); }
  catch(e){ erro(e); }
}
function telaSemAcesso(msg){
  screen.innerHTML = `
    <div class="login-wrap">
      <div class="login-logo">GT&amp;ABC</div>
      <div class="login-tit">Sem acesso</div>
      <div class="login-sub">Este app é da equipe de concretagem.</div>
      <div class="login-card" style="text-align:center">
        <div class="sub" style="margin-bottom:14px">O usuário <b>${userEmail}</b> não tem permissão de concretagem${perfisUsuario.length?` (perfil: ${perfisUsuario.join(', ')})`:''}.<br>Fale com a administradora.</div>
        ${msg?`<div class="sub" style="font-size:12px;color:#b02a20;margin-bottom:14px">detalhe técnico: ${msg}</div>`:''}
        <button class="bigbtn" onclick="sair()">Sair</button>
      </div>
    </div>`;
}
(async function(){
  const { data } = await sb.auth.getSession();
  if(data.session){ userEmail = data.session.user.email; iniciarApp(); }
  else telaLogin('');
})();

  window.addEventListener('load', ()=>navigator.serviceWorker.register('service-worker.js'));
