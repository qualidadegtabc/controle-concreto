<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle Tecnológico de Concreto</title>

  <!-- identidade do app (PWA) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#BD5D27">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --paper:#FFFBEE; --ink:#0E0E0E; --accent:#BD5D27; --amber:#FAA21B;
      --muted:#7A746A; --line:#ECEAE3; --soft:#F7E7D7;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--paper);
         color:var(--ink);min-height:100vh}
    header{background:var(--ink);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;
           position:sticky;top:0;z-index:10}
    header .logo{font-weight:800;border:2px solid #fff;border-radius:8px;padding:4px 9px;font-size:14px;letter-spacing:.5px}
    header .tit{font-size:15px;font-weight:600;line-height:1.2}
    header .sub{font-size:11px;color:#cfc9bd;font-weight:400}
    main{padding:18px;max-width:560px;margin:0 auto}
    h2{font-size:15px;color:var(--accent);margin:4px 0 12px;font-weight:700}
    .voltar{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;
            padding:0;margin-bottom:10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
    .item{display:flex;align-items:center;justify-content:space-between;
          background:#fff;border:1px solid var(--line);border-radius:12px;
          padding:15px 16px;margin-bottom:10px;cursor:pointer;
          font-size:15px;font-weight:600;transition:transform .05s}
    .item:active{transform:scale(.99)}
    .item .seta{color:var(--accent);font-size:18px}
    .item.pav{font-weight:500;font-size:14px;cursor:default}
    .item.pav .seta{display:none}
    .estado{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.5}
    .erro{background:#fde8e2;border:1px solid #e0b09f;color:#8a3220;border-radius:10px;
          padding:14px;font-size:13px;line-height:1.5;margin-top:10px}
    .badge{font-size:12px;color:var(--muted);font-weight:500}
  </style>
</head>
<body>
  <header>
    <div class="logo">GT&amp;ABC</div>
    <div>
      <div class="tit">Controle de Concreto</div>
      <div class="sub" id="sub">Selecione uma obra</div>
    </div>
  </header>

  <main id="app">
    <div class="estado">Carregando obras…</div>
  </main>

  <script>
    // ---- conexão ----
    const SUPABASE_URL = "https://anzggndtjtwwrbxfguvm.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuemdnbmR0anR3d3JieGZndXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDU2MDcsImV4cCI6MjA5NTgyMTYwN30.Jcx-wvWnMAtKg1epCsTV3RGlW01nw4RSDy4RvYIm78Q";

    const app = document.getElementById('app');
    const sub = document.getElementById('sub');

    // helper: chama a API REST do Supabase
    async function api(caminho){
      const r = await fetch(SUPABASE_URL + "/rest/v1/" + caminho, {
        headers: { apikey: ANON_KEY, Authorization: "Bearer " + ANON_KEY }
      });
      if(!r.ok){ throw new Error("HTTP " + r.status + " — " + await r.text()); }
      return r.json();
    }

    function erro(e){
      app.innerHTML = '<div class="erro"><b>Não consegui carregar.</b><br>' +
        'Detalhe técnico: ' + (e && e.message ? e.message : e) + '</div>';
    }

    // ---- tela 1: lista de obras ----
    async function verObras(){
      sub.textContent = "Selecione uma obra";
      app.innerHTML = '<div class="estado">Carregando obras…</div>';
      try{
        const obras = await api("obras?ativa=eq.true&order=nome");
        if(!obras.length){ app.innerHTML = '<div class="estado">Nenhuma obra cadastrada.</div>'; return; }
        let html = '<h2>Obras</h2>';
        obras.forEach(o=>{
          html += '<div class="item" onclick="verPavimentos('+o.id+', \''+o.nome.replace(/'/g,"\\'")+'\')">'
                + '<span>'+o.nome+'</span><span class="seta">›</span></div>';
        });
        app.innerHTML = html;
      }catch(e){ erro(e); }
    }

    // ---- tela 2: pavimentos de uma obra ----
    async function verPavimentos(obraId, obraNome){
      sub.textContent = obraNome;
      app.innerHTML = '<div class="estado">Carregando pavimentos…</div>';
      try{
        const pavs = await api("pavimentos?obra_id=eq."+obraId+"&order=ordem.desc");
        let html = '<button class="voltar" onclick="verObras()">‹ voltar para obras</button>';
        html += '<h2>'+obraNome+' <span class="badge">· '+pavs.length+' pavimentos</span></h2>';
        pavs.forEach(p=>{
          html += '<div class="item pav"><span>'+p.nome+'</span></div>';
        });
        app.innerHTML = html;
      }catch(e){ erro(e); }
    }

    // inicia
    verObras();

    // service worker (offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', ()=>navigator.serviceWorker.register('service-worker.js'));
    }
  </script>
</body>
</html>
